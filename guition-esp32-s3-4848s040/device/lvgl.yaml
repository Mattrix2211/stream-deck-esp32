# =============================================================================
# INTERFACE TACTILE LVGL
# =============================================================================
# Ce fichier définit l'interface graphique (GUI) pour l'écran tactile ESP32.
# Il crée des boutons qui contrôlent les appareils domotiques via Home Assistant.
#
# FONCTIONNEMENT :
# - Chaque bouton envoie une commande à Home Assistant quand il est pressé (on_press/on_click)
# - Les boutons reçoivent les mises à jour d'état depuis les capteurs définis dans sensors.yaml
# - Quand un capteur change, l'apparence du bouton se met à jour (coché/décoché)
#
# CONCEPTS CLÉS :
# - "id:" est un nom unique pour référencer cet élément depuis d'autres fichiers
# - "entity_id:" désigne un appareil/entité dans Home Assistant
# - "checkable: true" signifie que le bouton affiche visuellement l'état on/off
# - Les valeurs "$variable" (comme $button_width) sont définies dans template.yaml
# - Les capteurs dans sensors.yaml surveillent Home Assistant et mettent à jour les boutons
# =============================================================================

lvgl:
  buffer_size: 100%
  top_layer:
    widgets:
    
      # =========================================================================
      # AFFICHAGE TEMPÉRATURE (coin supérieur gauche)
      # =========================================================================
      # CE QUE ÇA AFFICHE :
      #   Affiche deux températures : "extérieur° / intérieur°"
      #   Exemple : "15° / 22°" signifie 15°C dehors, 22°C dans le bureau
      #
      # SOURCE DES DONNÉES (définie dans sensors.yaml) :
      #   - Chiffre de gauche : sensor.outdoor_temperature (capteur extérieur)
      #   - Chiffre de droite : sensor.office_temperature (capteur intérieur)
      #
      # MISE À JOUR :
      #   Quand l'un des capteurs de température change dans Home Assistant,
      #   sensors.yaml déclenche une mise à jour du texte de ce label.
      # =========================================================================
      - label:
          text: "-° / -°"
          id: temperatures
          styles: roboto15_style
          align: top_left
          x: 8
          y: 4
          text_color: 0xFFFFFF

      # =========================================================================
      # AFFICHAGE HORLOGE (centre haut de l'écran)
      # =========================================================================
      # CE QUE ÇA AFFICHE :
      #   Heure actuelle au format 24h (ex. : "14:30")
      #
      # SOURCE DES DONNÉES :
      #   Le composant time (configuré dans addon/time.yaml) se synchronise
      #   avec l'heure de Home Assistant et met à jour ce label chaque minute.
      # =========================================================================
      - label:
          text: "--:--"
          id: display_time
          styles: roboto15_style
          align: top_mid
          x: 0
          y: 4
          text_align: center
          text_color: 0xFFFFFF
          
  pages:
    - id: main_page
      layout: 
        type: grid
        grid_columns: [fr(1), fr(1), fr(1)]
        grid_rows: [fr(1), fr(1), fr(1)]
      scrollbar_mode: "off"
      scroll_dir: "hor"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      
      widgets:
      
        # =========================================================================
        # BOUTON : Scène Ambiance
        # =========================================================================
        # RÔLE :
        #   Active la scène d'éclairage "Ambiance" - un preset qui allume
        #   le ruban LED pour un effet décoratif.
        #
        # AU CLIC :
        #   Appelle le service Home Assistant : switch.toggle
        #   Cible : switch.office_features_stateful_scene
        #
        # ÉTAT VISUEL :
        #   sensors.yaml surveille : switch.office_features_stateful_scene
        #   Quand ce capteur est ON, le bouton apparaît "coché" (mis en évidence)
        #   Quand il est OFF, le bouton apparaît décoché (atténué)
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: office_scene_features_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: scene_features_icon                
                  text: $ledstrip
              - label:
                  align: bottom_left
                  id: scene_features_label
                  text: "Ambiance"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_features_stateful_scene

        # =========================================================================
        # BOUTON : Scène Appels
        # =========================================================================
        # RÔLE :
        #   Active la scène d'éclairage "Appels" - éclairage optimisé pour
        #   les visioconférences (bon éclairage frontal, moins de reflets).
        #
        # AU CLIC :
        #   Appelle le service Home Assistant : switch.toggle
        #   Cible : switch.office_calls_stateful_scene
        #
        # ÉTAT VISUEL :
        #   sensors.yaml surveille : switch.office_calls_stateful_scene
        #   Quand ce capteur est ON, le bouton apparaît "coché" (mis en évidence)
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: office_scene_calls_button
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: office_scene_calls_icon                
                  text: $videocall
              - label:
                  align: bottom_left
                  id: office_scene_calls_label
                  text: "Appels"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_calls_stateful_scene

        # =========================================================================
        # BOUTON : Scène Soirée
        # =========================================================================
        # RÔLE :
        #   Active la scène d'éclairage "Soirée" - éclairage chaud et ambiant
        #   pour une utilisation détendue en soirée (luminosité réduite, couleurs chaudes).
        #
        # AU CLIC :
        #   Appelle le service Home Assistant : switch.toggle
        #   Cible : switch.office_evening_stateful_scene
        #
        # ÉTAT VISUEL :
        #   sensors.yaml surveille : switch.office_evening_stateful_scene
        #   Quand ce capteur est ON, le bouton apparaît "coché" (mis en évidence)
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: office_scene_evening_button
            styles: control
            grid_cell_column_pos: 2
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: office_scene_evening_icon                
                  text: $nightlight
              - label:
                  align: bottom_left
                  id: office_scene_evening_label
                  text: "Soirée"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_evening_stateful_scene

        # =========================================================================
        # BOUTON : Scène Tamisée
        # =========================================================================
        # RÔLE :
        #   Active la scène d'éclairage "Tamisée" - niveau de lumière très bas,
        #   utile pour regarder des films ou réduire la fatigue oculaire la nuit.
        #
        # AU CLIC :
        #   Appelle le service Home Assistant : switch.toggle
        #   Cible : switch.office_dimmed_stateful_scene
        #
        # ÉTAT VISUEL :
        #   sensors.yaml surveille : switch.office_dimmed_stateful_scene
        #   Quand ce capteur est ON, le bouton apparaît "coché" (mis en évidence)
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: office_scene_dimmed_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 1
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: office_scene_dimmed_icon                
                  text: $nightlight
              - label:
                  align: bottom_left
                  id: office_scene_dimmed_label
                  text: "Tamisé"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_dimmed_stateful_scene

        # =========================================================================
        # BOUTON : Volets (ouvre la page de contrôle des volets)
        # =========================================================================
        # RÔLE :
        #   Navigue vers la page dédiée au contrôle des volets.
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: false
            id: blinds_nav_button
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 1
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_closed
              - label:
                  align: bottom_left
                  text: "Volets"
            on_click:
              - lvgl.page.show: blinds_page


        # =========================================================================
        # BOUTON : Alimentation Imprimante 3D
        # =========================================================================
        # RÔLE :
        #   Allume ou éteint la prise de l'imprimante 3D.
        #   Contrôle une prise connectée qui alimente l'imprimante.
        #
        # AU CLIC :
        #   Appelle le service Home Assistant : switch.toggle
        #   Cible : switch.office_3d_printer_power
        #   (Toggle : si ON, passe à OFF. Si OFF, passe à ON.)
        #
        # ÉTAT VISUEL :
        #   sensors.yaml surveille : switch.office_3d_printer_power
        #   Quand la prise est ON, le bouton apparaît "coché" (mis en évidence)
        #   Quand elle est OFF, le bouton apparaît décoché (atténué)
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: printer_power_button
            styles: control
            grid_cell_column_pos: 2
            grid_cell_row_pos: 1
            widgets:
              # Icône (affichée quand éteint)
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: printer_power_icon
                  text: $printer
              # Progression (affichée quand allumé)
              - obj:
                  align: top_left
                  id: print_progress_container
                  height: SIZE_CONTENT
                  width: SIZE_CONTENT
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: end
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  hidden: true
                  widgets:
                    - label:
                        text_font: roboto44_font
                        text_color: 0xFFFFFF
                        id: print_progress_label
                        text: "--"
                    - label:
                        text_font: roboto17_font
                        text_color: 0xFFFFFF
                        text: "%"
              - label:
                  align: bottom_left
                  id: printer_power_label
                  text: "Imprimante"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_3d_printer_power

        # =========================================================================
        # BOUTON : Séchoir à filament
        # =========================================================================
        # RÔLE :
        #   Allume ou éteint le séchoir/chauffoir à filament.
        #   Cet appareil retire l'humidité du filament d'imprimante 3D pour
        #   améliorer la qualité d'impression (filament humide = bulles et fragilité).
        #
        # AU CLIC :
        #   Appelle le service Home Assistant : switch.toggle
        #   Cible : switch.office_filament_heater_893b
        #   ("893b" est l'identifiant de la prise connectée)
        #
        # ÉTAT VISUEL :
        #   sensors.yaml surveille : switch.office_filament_heater_893b
        #   Quand la prise est ON, le bouton apparaît "coché" (mis en évidence)
        #   Quand elle est OFF, le bouton apparaît décoché (atténué)
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: filament_heater_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 2
            widgets:
              # Icône (affichée quand éteint)
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: filament_heater_icon
                  text: $filament
              # Humidité (affichée quand allumé)
              - obj:
                  align: top_left
                  id: dryer_humidity_container
                  height: SIZE_CONTENT
                  width: SIZE_CONTENT
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: end
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  hidden: true
                  widgets:
                    - label:
                        text_font: roboto44_font
                        text_color: 0xFFFFFF
                        id: dryer_humidity_label
                        text: "--"
                    - label:
                        text_font: roboto17_font
                        text_color: 0xFFFFFF
                        text: "%"
              - label:
                  align: bottom_left
                  id: filament_heater_label
                  text: "Séchoir"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_filament_heater_893b

        # =========================================================================
        # BOUTON : Climatiseur
        # =========================================================================
        # RÔLE :
        #   Ouvre la page de contrôle du climatiseur.
        #
        # AU CLIC :
        #   Navigue vers la page de contrôle de la clim.
        #
        # ÉTAT VISUEL :
        #   sensors.yaml surveille : switch.office_air_conditioner
        #   Quand la clim est en marche, le bouton apparaît "coché" (mis en évidence)
        #   Quand elle est éteinte, le bouton apparaît décoché (atténué)
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: office_aircon_button
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 2
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $aircon
              - label:
                  align: bottom_left
                  text: "Clim"
            on_click:
              - lvgl.page.show: aircon_page
              - lvgl.widget.update:
                  id: office_aircon_button
                  state:
                    checked: !lambda return id(office_air_conditioner).state;

        # =========================================================================
        # BOUTON : Plus
        # =========================================================================
        # RÔLE :
        #   Ouvre la page des contrôles supplémentaires.
        #
        # AU CLIC :
        #   Navigue vers la page extras.
        # =========================================================================
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: extras_nav_button
            styles: control
            grid_cell_column_pos: 2
            grid_cell_row_pos: 2
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $chevron_left
              - label:
                  align: bottom_left
                  text: "Plus"
            on_click:
              - lvgl.page.show: extras_page

    - id: extras_page
      layout:
        type: grid
        grid_columns: [fr(1), fr(1), fr(1)]
        grid_rows: [fr(1), fr(1), fr(1)]
      scrollbar_mode: "off"
      scroll_dir: "hor"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:

        # =========================================================================
        # BOUTON : Retour (retour à la page principale)
        # =========================================================================
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: extras_back_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $chevron_left
              - label:
                  align: bottom_left
                  text: "Retour"
            on_click:
              - lvgl.page.show: main_page

        # =========================================================================
        # BOUTON : Thermostat chauffage (vue détaillée)
        # =========================================================================
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: heating_lab_nav_button
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $aircon
              - label:
                  align: bottom_left
                  text: "Chauffage"
            on_click:
              - lvgl.page.show: heating_lab_page

        # =========================================================================
        # BOUTON : Chargeur de batteries
        # =========================================================================
        # RÔLE :
        #   Bascule la prise connectée du chargeur de batteries.
        #
        # AU CLIC :
        #   Appelle le service Home Assistant : switch.toggle
        #   Cible : switch.d4c5
        #
        # ÉTAT VISUEL :
        #   sensors.yaml surveille : switch.d4c5
        #   Quand la prise est ON, le bouton apparaît "coché" (mis en évidence)
        # =========================================================================
        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: battery_charger_button
            styles: control
            grid_cell_column_pos: 2
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: battery_charger_icon
                  text: $battery
              - label:
                  align: bottom_left
                  id: battery_charger_label
                  text: "Chargeur"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.d4c5

        # =========================================================================
        # BOUTON : Lumières rangement
        # =========================================================================
        # RÔLE :
        #   Bascule les lumières de la zone de rangement du bureau.
        #
        # AU CLIC :
        #   Appelle le service Home Assistant : light.toggle
        #   Cible : light.office_storage
        #
        # ÉTAT VISUEL :
        #   sensors.yaml surveille : light.office_storage
        #   Quand la lumière est ON, le bouton apparaît "coché" (mis en évidence)
        # =========================================================================
        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: storage_lights_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 1
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: storage_lights_icon
                  text: $package
              - label:
                  align: bottom_left
                  id: storage_lights_label
                  text: "Stockage"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.office_storage

        # =========================================================================
        # BOUTON : Lumières rack réseau
        # =========================================================================
        # RÔLE :
        #   Bascule les lumières du rack réseau.
        #
        # AU CLIC :
        #   Appelle le service Home Assistant : light.toggle
        #   Cible : light.office_network_rack
        #
        # ÉTAT VISUEL :
        #   sensors.yaml surveille : light.office_network_rack
        #   Quand la lumière est ON, le bouton apparaît "coché" (mis en évidence)
        # =========================================================================
        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: network_rack_button
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 1
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: network_rack_icon
                  text: $network
              - label:
                  align: bottom_left
                  id: network_rack_label
                  text: "Rack réseau"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.office_network_rack

    - id: blinds_page
      layout: 
        type: flex
        flex_flow: column_wrap
      scrollbar_mode: "off"
      scroll_dir: "hor"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:

        # =========================================================================
        # BOUTON : Retour (retour à la page principale)
        # =========================================================================
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: blinds_back_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $chevron_left
              - label:
                  align: bottom_left
                  text: "Retour"
            on_click:
              - lvgl.page.show: main_page

        # =========================================================================
        # BOUTON : Volet ouvert (100%)
        # =========================================================================
        # RÔLE :
        #   Ouvre complètement le volet de la fenêtre du bureau (position 100% ouverte).
        #   Lumière naturelle maximale dans la pièce.
        #
        # AU CLIC :
        #   Appelle le service Home Assistant : cover.set_cover_position
        #   Cible : cover.office_blind
        #   Position : 100 (totalement ouvert)
        #
        # ÉTAT VISUEL :
        #   sensors.yaml lit la position actuelle du volet depuis Home Assistant.
        #   Un capteur template (office_blind_100) vérifie si la position est
        #   à moins de 3% de 100%. Si vrai, ce bouton apparaît "coché".
        #   La tolérance de 3% tient compte des légères imprécisions du moteur.
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: office_blind_open_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_open
              - label:
                  align: bottom_left
                  text: "Ouvert"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.office_blind
                    position: "100"

        # =========================================================================
        # BOUTON : Volet mi-ouvert (66%)
        # =========================================================================
        # RÔLE :
        #   Positionne le volet à 66% d'ouverture.
        #   Bonne lumière naturelle tout en procurant un peu d'ombre.
        #
        # AU CLIC :
        #   Appelle le service Home Assistant : cover.set_cover_position
        #   Cible : cover.office_blind
        #   Position : 66 (deux tiers ouvert)
        #
        # ÉTAT VISUEL :
        #   sensors.yaml lit la position actuelle du volet depuis Home Assistant.
        #   Un capteur template (office_blind_66) vérifie si la position est
        #   à moins de 3% de 66%. Si vrai, ce bouton apparaît "coché".
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: office_blind_66_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_open
              - label:
                  align: bottom_left
                  text: "Mi-ouvert"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.office_blind
                    position: "66"

        # =========================================================================
        # BOUTON : Volet mi-fermé (33%)
        # =========================================================================
        # RÔLE :
        #   Positionne le volet à 33% d'ouverture.
        #   Principalement fermé mais laisse passer un peu de lumière.
        #
        # AU CLIC :
        #   Appelle le service Home Assistant : cover.set_cover_position
        #   Cible : cover.office_blind
        #   Position : 33 (un tiers ouvert)
        #
        # ÉTAT VISUEL :
        #   sensors.yaml lit la position actuelle du volet depuis Home Assistant.
        #   Un capteur template (office_blind_33) vérifie si la position est
        #   à moins de 3% de 33%. Si vrai, ce bouton apparaît "coché".
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: office_blind_33_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_open
              - label:
                  align: bottom_left
                  text: "Mi-fermé"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.office_blind
                    position: "33"

        # =========================================================================
        # BOUTON : Volet fermé (0%)
        # =========================================================================
        # RÔLE :
        #   Ferme complètement le volet de la fenêtre du bureau (position 0% ouverte).
        #   Bloque toute lumière naturelle et assure l'intimité.
        #
        # AU CLIC :
        #   Appelle le service Home Assistant : cover.set_cover_position
        #   Cible : cover.office_blind
        #   Position : 0 (totalement fermé)
        #
        # ÉTAT VISUEL :
        #   sensors.yaml lit la position actuelle du volet depuis Home Assistant.
        #   Un capteur template (office_blind_0) vérifie si la position est
        #   à moins de 3% de 0%. Si vrai, ce bouton apparaît "coché".
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: office_blind_close_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_closed
              - label:
                  align: bottom_left
                  text: "Fermé"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.office_blind
                    position: "0"

    - id: aircon_page
      layout: 
        type: flex
        flex_flow: column_wrap
      scrollbar_mode: "off"
      scroll_dir: "hor"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:

        # =========================================================================
        # BOUTON : Retour (retour à la page principale)
        # =========================================================================
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: aircon_back_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $chevron_left
              - label:
                  align: bottom_left
                  text: "Retour"
            on_click:
              - lvgl.page.show: main_page

        # =========================================================================
        # BOUTON : Température climatiseur
        # =========================================================================
        # RÔLE :
        #   Affiche la lecture de température actuelle du climatiseur.
        #
        # SOURCE DE DONNÉES :
        #   climate.office_air_conditioner (attribut : current_temperature)
        #
        # ÉLÉMENT UI ASSOCIÉ :
        #   sensors.yaml → aircon_temp_label
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: false
            id: aircon_temp_button
            styles: control
            widgets:
              - label:
                  text_font: roboto44_font
                  align: top_left
                  id: aircon_temp_label
                  text: "--"
                  text_color: 0xFFFFFF
              - label:
                  align: bottom_left
                  text: "Actuelle"

        # =========================================================================
        # BOUTON : Marche/Arrêt climatiseur
        # =========================================================================
        # RÔLE :
        #   Allume ou éteint le climatiseur.
        #
        # AU CLIC :
        #   Appelle le service Home Assistant : switch.toggle
        #   Cible : switch.office_air_conditioner
        #
        # ÉTAT VISUEL :
        #   sensors.yaml surveille : switch.office_air_conditioner
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: aircon_power_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $aircon
              - label:
                  align: bottom_left
                  text: "Marche"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_air_conditioner

        # =========================================================================
        # BOUTON : Augmenter température clim
        # =========================================================================
        # RÔLE :
        #   Augmente la température cible de 1°C.
        #   Affiché uniquement quand la clim est allumée.
        #
        # SOURCE DE DONNÉES :
        #   climate.office_air_conditioner (attribut : temperature)
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: false
            id: aircon_temp_up_button
            styles: control
            hidden: true
            widgets:
              - label:
                  text_font: roboto44_font
                  align: top_left
                  text: "+1°"
              - label:
                  align: bottom_left
                  text: "Monter"
            on_click:
              - homeassistant.service:
                  service: climate.set_temperature
                  data:
                    entity_id: climate.office_air_conditioner
                    temperature: !lambda |-
                      if (id(aircon_target_temperature).has_state()) {
                        return id(aircon_target_temperature).state + 1.0f;
                      }
                      return 0.0f;

        # =========================================================================
        # BOUTON : Consigne température clim
        # =========================================================================
        # RÔLE :
        #   Affiche la température cible/consigne actuelle.
        #   Affiché uniquement quand la clim est allumée.
        #
        # SOURCE DE DONNÉES :
        #   climate.office_air_conditioner (attribut : temperature)
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: false
            id: aircon_set_temp_button
            styles: control
            hidden: true
            widgets:
              - label:
                  text_font: roboto44_font
                  align: top_left
                  id: aircon_set_temp_label
                  text: "--"
                  text_color: 0xFFFFFF
              - label:
                  align: bottom_left
                  text: "Consigne"

        # =========================================================================
        # BOUTON : Baisser température clim
        # =========================================================================
        # RÔLE :
        #   Diminue la température cible de 1°C.
        #   Affiché uniquement quand la clim est allumée.
        #
        # SOURCE DE DONNÉES :
        #   climate.office_air_conditioner (attribut : temperature)
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: false
            id: aircon_temp_down_button
            styles: control
            hidden: true
            widgets:
              - label:
                  text_font: roboto44_font
                  align: top_left
                  text: "-1°"
              - label:
                  align: bottom_left
                  text: "Baisser"
            on_click:
              - homeassistant.service:
                  service: climate.set_temperature
                  data:
                    entity_id: climate.office_air_conditioner
                    temperature: !lambda |-
                      if (id(aircon_target_temperature).has_state()) {
                        return id(aircon_target_temperature).state - 1.0f;
                      }
                      return 0.0f;

    - id: aircon_lab_page
      layout:
        type: flex
        flex_flow: column
      scrollbar_mode: "off"
      width: 100%
      height: 100%
      bg_color: Black
      bg_opa: cover

      widgets:
        - obj:
            id: aircon_lab_root
            width: 100%
            height: 100%
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            widgets:
              # Bouton retour
              - button:
                  id: aircon_lab_back_button
                  width: 60px
                  height: 60px
                  x: 5
                  y: 34
                  styles: control
                  widgets:
                    - label:
                        text_font: $icon_font
                        align: center
                        text: $chevron_left
                  on_click:
                    - lvgl.page.show: aircon_page

              # Bouton marche/arrêt
              - button:
                  id: aircon_lab_power_button
                  width: 60px
                  height: 60px
                  x: 415
                  y: 34
                  styles: control
                  checkable: true
                  widgets:
                    - label:
                        text_font: $icon_font
                        align: center
                        text: $power
                  on_click:
                    - homeassistant.service:
                        service: switch.toggle
                        data:
                          entity_id: switch.office_air_conditioner

              # Arc de contrôle pour la température cible
              - arc:
                  id: aircon_target_arc
                  x: 60
                  y: 80
                  width: 360
                  height: 360
                  min_value: 8
                  max_value: 25
                  start_angle: 135
                  end_angle: 45
                  rotation: 0
                  value: 22
                  arc_width: 18
                  arc_color: 0x2A2A2A
                  clickable: true
                  adjustable: true
                  indicator:
                    arc_color: 0xFF8C00
                    arc_width: 18
                  knob:
                    bg_color: 0xFFFFFF
                  on_value:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: climate.office_air_conditioner
                          temperature: !lambda return x;

              # Arc indicateur de la température actuelle (lecture seule)
              - arc:
                  id: aircon_current_arc
                  x: 60
                  y: 80
                  width: 360
                  height: 360
                  min_value: 8
                  max_value: 25
                  start_angle: 135
                  end_angle: 45
                  rotation: 0
                  value: 22
                  arc_width: 0
                  arc_color: 0x000000
                  indicator:
                    arc_color: 0x7A7A7A
                    arc_width: 0
                  knob:
                    bg_color: 0x7A7A7A
                  clickable: false

              # Label température cible (en dessous)
              - label:
                  id: aircon_lab_target_label
                  text: "--°"
                  text_font: roboto36_font
                  text_color: 0xFFFFFF
                  align: center
                  y: 60

              # Bouton baisser
              - button:
                  id: aircon_lab_down_button
                  width: 70px
                  height: 70px
                  x: 160
                  y: 360
                  styles: control
                  radius: 35px
                  bg_opa: TRANSP
                  border_width: 2
                  border_color: 0x7A7A7A
                  border_opa: COVER
                  widgets:
                    - label:
                        text: "-"
                        text_font: roboto44_font
                        text_color: 0x7A7A7A
                        align: center
                  on_click:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: climate.office_air_conditioner
                          temperature: !lambda |-
                            if (id(aircon_target_temperature).has_state()) {
                              return id(aircon_target_temperature).state - 1.0f;
                            }
                            return 0.0f;

              # Bouton augmenter
              - button:
                  id: aircon_lab_up_button
                  width: 70px
                  height: 70px
                  x: 260
                  y: 360
                  styles: control
                  radius: 35px
                  bg_opa: TRANSP
                  border_width: 2
                  border_color: 0x7A7A7A
                  border_opa: COVER
                  widgets:
                    - label:
                        text: "+"
                        text_font: roboto44_font
                        text_color: 0x7A7A7A
                        align: center
                  on_click:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: climate.office_air_conditioner
                          temperature: !lambda |-
                            if (id(aircon_target_temperature).has_state()) {
                              return id(aircon_target_temperature).state + 1.0f;
                            }
                            return 0.0f;

    - id: heating_lab_page
      layout:
        type: flex
        flex_flow: column
      scrollbar_mode: "off"
      width: 100%
      height: 100%
      bg_color: 0x1E1E1E
      bg_opa: cover

      widgets:
        - obj:
            id: heating_lab_root
            width: 100%
            height: 100%
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            widgets:
              # Bouton retour
              - button:
                  id: heating_lab_back_button
                  width: 60px
                  height: 60px
                  x: 5
                  y: 34
                  styles: control
                  widgets:
                    - label:
                        text_font: $icon_font
                        align: center
                        text: $chevron_left
                  on_click:
                    - lvgl.page.show: main_page

              # Arc de piste de base
              - arc:
                  id: heating_track_arc
                  x: 60
                  y: 80
                  width: 360
                  height: 360
                  min_value: 20
                  max_value: 64
                  start_angle: 135
                  end_angle: 45
                  rotation: 0
                  value: 44
                  arc_width: 18
                  arc_color: 0x3A3A3A
                  clickable: false
                  adjustable: false
                  indicator:
                    arc_color: 0x3A3A3A
                    arc_width: 0
                  knob:
                    bg_color: 0x3A3A3A

              # Arc delta entre température actuelle et cible
              - arc:
                  id: heating_delta_arc
                  x: 60
                  y: 80
                  width: 360
                  height: 360
                  min_value: 20
                  max_value: 64
                  start_angle: 135
                  end_angle: 45
                  rotation: 0
                  value: 44
                  arc_width: 0
                  arc_color: 0x000000
                  indicator:
                    arc_color: 0xE06A2A
                    arc_width: 18
                  knob:
                    bg_color: 0x000000
                  clickable: false

              # Arc masque pour cacher le segment sous le minimum (couleur de piste)
              - arc:
                  id: heating_mask_arc
                  x: 60
                  y: 80
                  width: 360
                  height: 360
                  min_value: 20
                  max_value: 64
                  start_angle: 135
                  end_angle: 45
                  rotation: 0
                  value: 44
                  arc_width: 0
                  arc_color: 0x000000
                  indicator:
                    arc_color: 0x8A3F1E
                    arc_width: 18
                  knob:
                    bg_color: 0x000000
                  clickable: false

              # Point pour la température actuelle
              - arc:
                  id: heating_current_arc
                  x: 60
                  y: 80
                  width: 360
                  height: 360
                  min_value: 20
                  max_value: 64
                  start_angle: 135
                  end_angle: 45
                  rotation: 0
                  value: 44
                  arc_width: 0
                  arc_color: 0x000000
                  indicator:
                    arc_color: 0x000000
                    arc_width: 0
                  knob:
                    bg_color: 0xFFFFFF
                    border_width: 2
                    border_color: 0xE06A2A
                  clickable: false

              # Point pour la température cible
              - arc:
                  id: heating_target_dot_arc
                  x: 65
                  y: 85
                  width: 350
                  height: 350
                  min_value: 20
                  max_value: 64
                  start_angle: 135
                  end_angle: 45
                  rotation: 0
                  value: 44
                  arc_width: 0
                  arc_color: 0x000000
                  indicator:
                    arc_color: 0x000000
                    arc_width: 0
                  knob:
                    bg_color: 0xFFFFFF
                    width: 40
                    height: 40
                    radius: 20
                    border_width: 4
                    border_color: 0xE06A2A
                  clickable: true
                  adjustable: true
                  on_value:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: climate.office_radiator_thermostat
                          hvac_mode: heat
                          temperature: !lambda return (float)x / 2.0f;

              # Label mode
              - label:
                  id: heating_lab_mode_label
                  text: "Chauffe"
                  text_font: roboto19_font
                  text_color: 0xE06A2A
                  align: center
                  y: -70

              # Label température cible (centre)
              - label:
                  id: heating_lab_target_label
                  text: "--.-°C"
                  text_font: roboto48_font
                  text_color: 0xE6E6E6
                  align: center

              # Label température actuelle (en dessous)
              - obj:
                  id: heating_lab_current_row
                  width: SIZE_CONTENT
                  height: SIZE_CONTENT
                  align: center
                  y: 55
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: center
                  widgets:
                    - label:
                        id: heating_lab_current_icon
                        text: $thermometer
                        text_font: icon_font_small
                        text_color: 0xE06A2A
                        align: center
                        pad_right: 6
                    - label:
                        id: heating_lab_current_value
                        text: "--.-°C"
                        text_font: roboto19_font
                        text_color: 0xE06A2A
                        align: center

              # Bouton baisser (-0.5°C)
              - button:
                  id: heating_lab_down_button
                  width: 70px
                  height: 70px
                  x: 160
                  y: 360
                  styles: control
                  radius: 35px
                  bg_opa: TRANSP
                  border_width: 2
                  border_color: 0x7A7A7A
                  widgets:
                    - label:
                        text: "-"
                        text_font: roboto44_font
                        align: center
                        text_color: 0xB0B0B0
                  on_click:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: climate.office_radiator_thermostat
                          hvac_mode: heat
                          temperature: !lambda |-
                            if (id(heating_target_temperature).has_state()) {
                              return id(heating_target_temperature).state - 0.5f;
                            }
                            return 0.0f;

              # Bouton augmenter (+0.5°C)
              - button:
                  id: heating_lab_up_button
                  width: 70px
                  height: 70px
                  x: 260
                  y: 360
                  styles: control
                  radius: 35px
                  bg_opa: TRANSP
                  border_width: 2
                  border_color: 0x7A7A7A
                  widgets:
                    - label:
                        text: "+"
                        text_font: roboto44_font
                        align: center
                        text_color: 0xB0B0B0
                  on_click:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: climate.office_radiator_thermostat
                          hvac_mode: heat
                          temperature: !lambda |-
                            if (id(heating_target_temperature).has_state()) {
                              return id(heating_target_temperature).state + 0.5f;
                            }
                            return 0.0f;
