# =============================================================================
# CAPTEURS - Synchronisation des états Home Assistant
# =============================================================================
# Ce fichier crée des capteurs qui surveillent les entités Home Assistant et
# mettent à jour les boutons de l'écran tactile pour refléter l'état actuel
# de vos appareils domotiques.
#
# POURQUOI CE FICHIER EXISTE :
# Quand vous appuyez sur un bouton de l'écran tactile, il envoie une commande
# à Home Assistant. Mais si quelqu'un allume une lumière depuis son téléphone,
# ou qu'une scène s'active automatiquement ? Ce fichier garantit que l'écran
# affiche toujours l'état RÉEL de chaque appareil, pas juste le dernier appui.
#
# FONCTIONNEMENT :
# 1. Chaque capteur s'abonne à une entité Home Assistant (switch, sensor, etc.)
# 2. Quand l'état de cette entité change, le déclencheur "on_state" ou "on_value" s'active
# 3. Le déclencheur met à jour le bouton correspondant dans lvgl.yaml pour afficher le nouvel état
#
# CONCEPTS CLÉS :
# - "platform: homeassistant" = lit l'état directement depuis Home Assistant
# - "platform: template" = calcule une valeur via du code (lambda)
# - "entity_id:" = l'appareil/entité Home Assistant à surveiller
# - "id:" = nom unique pour référencer ce capteur ailleurs dans ESPHome
# - "trigger_on_initial_state: true" = met à jour le bouton dès le démarrage
# - "lvgl.widget.update" = change l'apparence d'un bouton à l'écran
# - "checked: !lambda return x;" = x est l'état booléen du capteur (true/false)
#
# RELATION AVEC lvgl.yaml :
# Chaque capteur ici a un bouton correspondant dans lvgl.yaml :
#   - Ce fichier LIT l'état depuis Home Assistant → met à jour l'apparence du bouton
#   - lvgl.yaml ENVOIE des commandes à Home Assistant → quand le bouton est pressé
# =============================================================================


# =============================================================================
# CAPTEURS NUMÉRIQUES
# =============================================================================
# Ces capteurs lisent des valeurs numériques comme la température et la position.
# Ils servent à afficher des informations ou calculer d'autres états.
# =============================================================================

sensor:

  # ===========================================================================
  # CAPTEUR : Température bureau (intérieur)
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   La température intérieure du bureau depuis sensor.office_temperature
  #   (Peut provenir d'un thermostat connecté, d'un capteur dédié, etc.)
  #
  # CE QU'IL MET À JOUR :
  #   Le label "temperatures" en haut à gauche de l'écran
  #   Format : "extérieur° / intérieur°" (ex. : "15° / 22°")
  #
  # FONCTIONNEMENT :
  #   Quand la température du bureau change dans Home Assistant, ce capteur
  #   reçoit la nouvelle valeur et met à jour le texte du label. Il combine
  #   la température extérieure (de l'autre capteur ci-dessous) avec cette valeur.
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → label temperatures (id: temperatures)
  # ===========================================================================
  - platform: homeassistant
    entity_id: sensor.office_temperature
    id: office_temperature
    on_value:
      - lvgl.label.update:
          id: temperatures
          text:
            format: "%d° / %d°"
            args: [ '(int)round(id(outdoor_temperature).state)', '(int)round(x)' ]

  # ===========================================================================
  # CAPTEUR : Température extérieure
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   La température extérieure depuis sensor.outdoor_temperature
  #   (Peut provenir d'un service météo, d'un capteur extérieur, etc.)
  #
  # CE QU'IL MET À JOUR :
  #   Le label "temperatures" en haut à gauche de l'écran
  #   Format : "extérieur° / intérieur°" (ex. : "15° / 22°")
  #
  # FONCTIONNEMENT :
  #   Quand la température extérieure change dans Home Assistant, ce capteur
  #   reçoit la nouvelle valeur et met à jour le texte du label. Il combine
  #   cette valeur avec la température du bureau (du capteur ci-dessus).
  #
  # REMARQUE : Les deux capteurs de température mettent à jour le même label.
  #            L'un ou l'autre qui change actualisera l'affichage avec les deux valeurs.
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → label temperatures (id: temperatures)
  # ===========================================================================
  - platform: homeassistant
    entity_id: sensor.outdoor_temperature
    id: outdoor_temperature
    on_value:
      - lvgl.label.update:
          id: temperatures
          text:
            format: "%d° / %d°"
            args: [ '(int)round(x)', '(int)round(id(office_temperature).state)' ]

  # ===========================================================================
  # CAPTEUR : Position volet bureau
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   La position actuelle du volet de la fenêtre du bureau (0-100%)
  #   Lit l'attribut "current_position" depuis cover.office_blind
  #
  # UTILISATION :
  #   Ce capteur ne met pas à jour les boutons directement. Il fournit
  #   la valeur de position que les capteurs template ci-dessous utilisent
  #   pour déterminer quel bouton de volet doit être mis en évidence.
  #
  # POURQUOI SÉPARÉ :
  #   Le volet a 4 boutons préréglés (0%, 33%, 66%, 100%), mais le volet
  #   peut être à N'IMPORTE QUELLE position. Ce capteur stocke la position
  #   réelle, et les capteurs template vérifient si elle est "assez proche"
  #   de chaque préréglage (à 3% près) pour mettre en évidence ce bouton.
  #
  # ÉLÉMENTS UI ASSOCIÉS :
  #   lvgl.yaml → office_blind_open_button, office_blind_66_button,
  #               office_blind_33_button, office_blind_close_button
  # ===========================================================================
  - platform: homeassistant
    entity_id: cover.office_blind
    id: office_blind_position
    attribute: current_position

  # ===========================================================================
  # CAPTEUR : Température actuelle climatiseur
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   Température actuelle rapportée par le climatiseur
  #   Surveille : climate.office_air_conditioner (current_temperature)
  #
  # CE QU'IL MET À JOUR :
  #   Le label de température dans le bouton Clim Temp
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → aircon_temp_label
  # ===========================================================================
  - platform: homeassistant
    entity_id: climate.office_air_conditioner
    id: aircon_current_temperature
    attribute: current_temperature
    on_value:
      - lvgl.label.update:
          id: aircon_temp_label
          text:
            format: "%.0f°"
            args: [ 'x' ]
      - lvgl.arc.update:
          id: aircon_current_arc
          value: !lambda return (int)x;

  # ===========================================================================
  # CAPTEUR : Température cible climatiseur
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   Température cible/consigne rapportée par le climatiseur
  #   Surveille : climate.office_air_conditioner (temperature)
  #
  # CE QU'IL MET À JOUR :
  #   Le label de consigne dans le bouton Clim Consigne
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → aircon_set_temp_label
  # ===========================================================================
  - platform: homeassistant
    entity_id: climate.office_air_conditioner
    id: aircon_target_temperature
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: aircon_set_temp_label
          text:
            format: "%.0f°"
            args: [ 'x' ]
      - lvgl.label.update:
          id: aircon_lab_target_label
          text:
            format: "%.0f°"
            args: [ 'x' ]
      - lvgl.arc.update:
          id: aircon_target_arc
          value: !lambda return (int)x;

  # ===========================================================================
  # CAPTEUR : Température actuelle chauffage
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   Température actuelle rapportée par le thermostat de chauffage
  #   Surveille : climate.office_radiator_thermostat (current_temperature)
  #
  # CE QU'IL MET À JOUR :
  #   Le label de température actuelle et l'arc sur la page chauffage détaillée
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → heating_lab_current_label, heating_current_arc
  # ===========================================================================
  - platform: homeassistant
    entity_id: climate.office_radiator_thermostat
    id: heating_current_temperature
    attribute: current_temperature
    on_value:
      - lvgl.label.update:
          id: heating_lab_current_value
          text:
            format: "%.1f°C"
            args: [ 'x' ]
      - lvgl.arc.update:
          id: heating_current_arc
          value: !lambda return (int)roundf(x * 2.0f);
      - lvgl.arc.update:
          id: heating_delta_arc
          value: !lambda |-
            float cur = x;
            float tgt = cur;
            if (id(heating_target_temperature).has_state()) {
              tgt = id(heating_target_temperature).state;
            }
            int cur_v = (int)roundf(cur * 2.0f);
            int tgt_v = (int)roundf(tgt * 2.0f);
            return cur_v > tgt_v ? cur_v : tgt_v;
      - lvgl.arc.update:
          id: heating_mask_arc
          value: !lambda |-
            float cur = x;
            float tgt = cur;
            if (id(heating_target_temperature).has_state()) {
              tgt = id(heating_target_temperature).state;
            }
            int cur_v = (int)roundf(cur * 2.0f);
            int tgt_v = (int)roundf(tgt * 2.0f);
            return cur_v < tgt_v ? cur_v : tgt_v;

  # ===========================================================================
  # CAPTEUR : Température cible chauffage
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   Température cible/consigne rapportée par le thermostat de chauffage
  #   Surveille : climate.office_radiator_thermostat (temperature)
  #
  # CE QU'IL MET À JOUR :
  #   Le label de température cible et l'arc sur la page chauffage détaillée
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → heating_lab_target_label, heating_target_arc
  # ===========================================================================
  - platform: homeassistant
    entity_id: climate.office_radiator_thermostat
    id: heating_target_temperature
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: heating_lab_target_label
          text:
            format: "%.1f°C"
            args: [ 'x' ]
      - lvgl.arc.update:
          id: heating_track_arc
          value: !lambda return (int)roundf(x * 2.0f);
      - lvgl.arc.update:
          id: heating_target_dot_arc
          value: !lambda return (int)roundf(x * 2.0f);
      - lvgl.arc.update:
          id: heating_delta_arc
          value: !lambda |-
            float tgt = x;
            float cur = tgt;
            if (id(heating_current_temperature).has_state()) {
              cur = id(heating_current_temperature).state;
            }
            int cur_v = (int)roundf(cur * 2.0f);
            int tgt_v = (int)roundf(tgt * 2.0f);
            return cur_v > tgt_v ? cur_v : tgt_v;
      - lvgl.arc.update:
          id: heating_mask_arc
          value: !lambda |-
            float tgt = x;
            float cur = tgt;
            if (id(heating_current_temperature).has_state()) {
              cur = id(heating_current_temperature).state;
            }
            int cur_v = (int)roundf(cur * 2.0f);
            int tgt_v = (int)roundf(tgt * 2.0f);
            return cur_v < tgt_v ? cur_v : tgt_v;

# =============================================================================
# CAPTEURS TEXTE (Valeurs chaînes de caractères)
# =============================================================================

text_sensor:
  # ===========================================================================
  # CAPTEUR : Action HVAC chauffage
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   Action actuelle rapportée par le thermostat de chauffage (heating/off/idle)
  #   Surveille : climate.office_radiator_thermostat (hvac_action)
  #
  # CE QU'IL MET À JOUR :
  #   Le label de mode sur la page chauffage détaillée
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → heating_lab_mode_label
  # ===========================================================================
  - platform: homeassistant
    entity_id: climate.office_radiator_thermostat
    id: heating_hvac_action
    attribute: hvac_action
    on_value:
      - lvgl.label.update:
          id: heating_lab_mode_label
          text: !lambda |-
            if (x == "heating") return "Chauffe";
            if (x == "idle") return "Veille";
            if (x == "off") return "Éteint";
            return x.c_str();

  # ===========================================================================
  # CAPTEUR : Progression d'impression Centauri Carbon
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   Pourcentage de progression d'impression actuel depuis Home Assistant
  #   Surveille : sensor.centauri_carbon_percent_complete_helper
  #
  # CE QU'IL MET À JOUR :
  #   Le label de progression dans le bouton "Imprimante"
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → print_progress_label
  # ===========================================================================
  - platform: homeassistant
    entity_id: sensor.centauri_carbon_percent_complete_helper
    id: centauri_carbon_percent
    on_value:
      - lvgl.label.update:
          id: print_progress_label
          text:
            format: "%.0f"
            args: [ 'x' ]

  # ===========================================================================
  # CAPTEUR : Humidité séchoir à filament
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   Pourcentage d'humidité actuel du capteur du séchoir à filament
  #   Surveille : sensor.office_filament_heater_sensor_humidity
  #
  # CE QU'IL MET À JOUR :
  #   Le label d'humidité dans le bouton "Séchoir"
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → dryer_humidity_label
  # ===========================================================================
  - platform: homeassistant
    entity_id: sensor.office_filament_heater_sensor_humidity
    id: filament_heater_humidity
    on_value:
      - lvgl.label.update:
          id: dryer_humidity_label
          text:
            format: "%.0f"
            args: [ 'x' ]



# =============================================================================
# CAPTEURS BINAIRES (États On/Off)
# =============================================================================
# Ces capteurs suivent les états on/off et mettent à jour l'apparence des boutons.
# Quand le capteur est ON (true), le bouton s'affiche "coché" (mis en évidence).
# Quand le capteur est OFF (false), le bouton s'affiche décoché (atténué).
# =============================================================================

binary_sensor:

  # ===========================================================================
  # CAPTEUR : Scène Soirée bureau active
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   Si la scène d'éclairage "Soirée" est actuellement active
  #   Surveille : switch.office_evening_stateful_scene dans Home Assistant
  #
  # CE QU'IL MET À JOUR :
  #   L'état visuel du bouton "Soirée" (mis en évidence quand actif)
  #
  # FONCTIONNEMENT :
  #   Home Assistant a un capteur binaire qui est ON quand la scène soirée
  #   est active. Quand cela change, l'apparence du bouton se met à jour.
  #   "trigger_on_initial_state: true" assure l'affichage correct dès le démarrage.
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → office_scene_evening_button
  # ===========================================================================
  - platform: homeassistant
    id: office_scene_evening
    entity_id: switch.office_evening_stateful_scene
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: office_scene_evening_button
          state:
            checked: !lambda return x;

  # ===========================================================================
  # CAPTEUR : Scène Tamisée bureau active
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   Si la scène d'éclairage "Tamisée" est actuellement active
  #   Surveille : switch.office_dimmed_stateful_scene dans Home Assistant
  #
  # CE QU'IL MET À JOUR :
  #   L'état visuel du bouton "Tamisé" (mis en évidence quand actif)
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → office_scene_dimmed_button
  # ===========================================================================
  - platform: homeassistant
    id: office_scene_dimmed
    entity_id: switch.office_dimmed_stateful_scene
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: office_scene_dimmed_button
          state:
            checked: !lambda return x;

  # ===========================================================================
  # CAPTEUR : Scène Appels bureau active
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   Si la scène d'éclairage "Appels" (visioconférence) est actuellement active
  #   Surveille : switch.office_calls_stateful_scene dans Home Assistant
  #
  # CE QU'IL MET À JOUR :
  #   L'état visuel du bouton "Appels" (mis en évidence quand actif)
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → office_scene_calls_button
  # ===========================================================================
  - platform: homeassistant
    id: office_scene_desk_call
    entity_id: switch.office_calls_stateful_scene
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: office_scene_calls_button
          state:
            checked: !lambda return x;

  # ===========================================================================
  # CAPTEUR : Scène Ambiance bureau active
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   Si la scène d'éclairage "Ambiance" (ruban LED) est actuellement active
  #   Surveille : switch.office_features_stateful_scene dans Home Assistant
  #
  # CE QU'IL MET À JOUR :
  #   L'état visuel du bouton "Ambiance" (mis en évidence quand actif)
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → office_scene_features_button
  # ===========================================================================
  - platform: homeassistant
    id: office_scene_features
    entity_id: switch.office_features_stateful_scene
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: office_scene_features_button
          state:
            checked: !lambda return x;

  # ===========================================================================
  # CAPTEUR : État alimentation imprimante 3D
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   Si la prise connectée de l'imprimante 3D est allumée ou éteinte
  #   Surveille : switch.office_3d_printer_power dans Home Assistant
  #
  # CE QU'IL MET À JOUR :
  #   L'état visuel du bouton "Imprimante" (mis en évidence quand allumé)
  #
  # REMARQUE : Surveille une entité "switch" mais utilise la plateforme binary_sensor.
  #            ESPHome traite l'état on/off du switch comme une valeur binaire ici.
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → printer_power_button
  # ===========================================================================
  - platform: homeassistant
    id: office_3d_printer_power
    entity_id: switch.office_3d_printer_power
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: printer_power_button
            state:
              checked: !lambda return x;
        - lvgl.widget.update:
            id: printer_power_icon
            hidden: !lambda return x;
        - lvgl.widget.update:
            id: print_progress_container
            hidden: !lambda return !x;

  # ===========================================================================
  # CAPTEUR : État climatiseur
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   Si le climatiseur du bureau est en marche
  #   Surveille : switch.office_air_conditioner dans Home Assistant
  #
  # CE QU'IL MET À JOUR :
  #   L'état visuel du bouton "Clim" (mis en évidence quand en marche)
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → office_aircon_button
  # ===========================================================================
  - platform: homeassistant
    id: office_air_conditioner
    entity_id: switch.office_air_conditioner
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: office_aircon_button
            state:
              checked: !lambda return x;
        - lvgl.widget.update:
            id: aircon_power_button
            state:
              checked: !lambda return x;
        - lvgl.widget.update:
            id: aircon_lab_power_button
            state:
              checked: !lambda return x;
        - lvgl.widget.update:
            id: aircon_temp_up_button
            hidden: !lambda return !x;
        - lvgl.widget.update:
            id: aircon_temp_down_button
            hidden: !lambda return !x;
        - lvgl.widget.update:
            id: aircon_set_temp_button
            hidden: !lambda return !x;

  # ===========================================================================
  # CAPTEUR : État chargeur de batteries
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   Si la prise connectée du chargeur de batteries est allumée ou éteinte
  #   Surveille : switch.d4c5 dans Home Assistant
  #
  # CE QU'IL MET À JOUR :
  #   L'état visuel du bouton "Chargeur" (mis en évidence quand allumé)
  #
  # REMARQUE : "d4c5" est l'identifiant par défaut de l'appareil. Envisager de le
  #            renommer dans Home Assistant en quelque chose de plus clair comme "switch.office_charger"
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → battery_charger_button
  # ===========================================================================
  - platform: homeassistant
    id: office_battery_charger
    entity_id: switch.d4c5
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: battery_charger_button
          state:
            checked: !lambda return x;

  # ===========================================================================
  # CAPTEUR : État séchoir à filament
  # ===========================================================================
  # CE QU'IL SURVEILLE :
  #   Si le séchoir/chauffoir à filament est allumé ou éteint
  #   Surveille : switch.office_filament_heater_893b dans Home Assistant
  #
  # CE QU'IL MET À JOUR :
  #   L'état visuel du bouton "Séchoir" (mis en évidence quand en marche)
  #
  # REMARQUE : Le séchoir à filament retire l'humidité du filament d'imprimante 3D.
  #            Un filament sec produit des impressions de meilleure qualité.
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → filament_heater_button
  # ===========================================================================
  - platform: homeassistant
    id: office_filament_heater
    entity_id: switch.office_filament_heater_893b
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: filament_heater_button
            state:
              checked: !lambda return x;
        - lvgl.widget.update:
            id: filament_heater_icon
            hidden: !lambda return x;
        - lvgl.widget.update:
            id: dryer_humidity_container
            hidden: !lambda return !x;

  # ===========================================================================
  # CAPTEUR TEMPLATE : Volet à 100% (totalement ouvert)
  # ===========================================================================
  # RÔLE :
  #   Calcule si le volet est à (ou très proche de) 100% d'ouverture
  #   Retourne VRAI si la position est à moins de 3% de 100, FAUX sinon
  #
  # POURQUOI UN TEMPLATE :
  #   Le moteur du volet peut ne pas s'arrêter exactement à 100% (99% ou 101%).
  #   Ce template utilise une tolérance de 3% pour tenir compte de cette imprécision.
  #   Si la position est entre 97-100%, on considère le volet "totalement ouvert".
  #
  # FONCTIONNEMENT DU CODE :
  #   1. Vérifie si office_blind_position a reçu une valeur
  #   2. Calcule : |position_actuelle - 100| <= 3
  #   3. Retourne vrai si dans la plage, faux sinon
  #
  # CE QU'IL MET À JOUR :
  #   L'état visuel du bouton "Ouvert" (mis en évidence quand volet ~100%)
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → office_blind_open_button
  # ===========================================================================
  - platform: template
    id: office_blind_100
    lambda: |-
      if (id(office_blind_position).has_state()) {
        return abs(id(office_blind_position).state - 100) <= 3;
      }
      return false;
    on_state:
      then:
        lvgl.widget.update:
          id: office_blind_open_button
          state:
            checked: !lambda return x;

  # ===========================================================================
  # CAPTEUR TEMPLATE : Volet à 66% (mi-ouvert)
  # ===========================================================================
  # RÔLE :
  #   Calcule si le volet est à (ou très proche de) 66% d'ouverture
  #   Retourne VRAI si la position est à moins de 3% de 66, FAUX sinon
  #
  # FONCTIONNEMENT DU CODE :
  #   Même logique que ci-dessus, mais vérifie 66% (plage : 63-69%)
  #
  # CE QU'IL MET À JOUR :
  #   L'état visuel du bouton "Mi-ouvert" (mis en évidence quand volet ~66%)
  #
  # ÉLÉMENT UI ASSOCIÉ :
  #   lvgl.yaml → office_blind_66_button
  # ===========================================================================
  - platform: template
    id: office_blind_66
    lambda: |-
      if (id(office_blind_position).has_state()) {
        return abs(id(office_blind_position).state - 66) <= 3;
      }
      return false;
    on_state:
      then:
        lvgl.widget.update:
          id: office_blind_66_button
          state:
            checked: !lambda return x;

