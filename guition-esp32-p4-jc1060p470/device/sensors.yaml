# ─────────────────────────────────────────────────────────────
# TEMPÉRATURE DE COULEUR → panneau (slider si sélectionné)
# ─────────────────────────────────────────────────────────────
  - platform: homeassistant
    id: bureau_color_temp
    entity_id: light.ampoule_bureau
    attribute: color_temp
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return id(selected_light_valid) && id(selected_light) == "light.ampoule_bureau";'
          then:
            - lambda: |-
                int k = (x > 0) ? (int)(1000000.0f / x) : 4000;
                k = std::max(2700, std::min(6500, k));
                id(sel_color_temp_kelvin) = k;
                lv_slider_set_value(id(color_temp_slider), k, LV_ANIM_OFF);

  - platform: homeassistant
    id: cuisine_color_temp
    entity_id: light.0x001788010c2dee03
    attribute: color_temp
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return id(selected_light_valid) && id(selected_light) == "light.0x001788010c2dee03";'
          then:
            - lambda: |-
                int k = (x > 0) ? (int)(1000000.0f / x) : 4000;
                k = std::max(2700, std::min(6500, k));
                id(sel_color_temp_kelvin) = k;
                lv_slider_set_value(id(color_temp_slider), k, LV_ANIM_OFF);

  - platform: homeassistant
    id: couloir_color_temp
    entity_id: light.0x001788010c2de07e
    attribute: color_temp
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return id(selected_light_valid) && id(selected_light) == "light.0x001788010c2de07e";'
          then:
            - lambda: |-
                int k = (x > 0) ? (int)(1000000.0f / x) : 4000;
                k = std::max(2700, std::min(6500, k));
                id(sel_color_temp_kelvin) = k;
                lv_slider_set_value(id(color_temp_slider), k, LV_ANIM_OFF);


# ─────────────────────────────────────────────────────────────
# HORLOGE + COULEURS RGB
# ─────────────────────────────────────────────────────────────
text_sensor:
  - platform: homeassistant
    id: current_time_ha
    entity_id: sensor.time
    internal: true
    on_value:
      - lvgl.label.update:
          id: display_time
          text:
            format: "%s"
            args: [ x.c_str() ]

  # ── RGB : Led chambre ────────────────────────────────────
  - platform: homeassistant
    id: led_chambre_rgb
    entity_id: light.0x001788010c58b8f2
    attribute: rgb_color
    internal: true
    on_value:
      - lambda: |-
