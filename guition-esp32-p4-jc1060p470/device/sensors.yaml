sensor:
  # Température intérieure
  - platform: homeassistant
    id: indoor_temperature
    entity_id: sensor.office_temperature
    internal: true
    on_value:
      - lvgl.label.update:
          id: temperatures
          text:
            format: "%.0f° / -°"
            args:
              - x

  # Température extérieure
  - platform: homeassistant
    id: outdoor_temperature
    entity_id: sensor.outdoor_temperature
    internal: true
    on_value:
      - lvgl.label.update:
          id: temperatures
          text:
            format: "%.0f° / %.0f°"
            args:
              - id(indoor_temperature).state
              - x

  # Bureau - luminosité réelle
  - platform: homeassistant
    id: bureau_brightness
    entity_id: light.ampoule_bureau
    attribute: brightness
    internal: true
    filters:
      - multiply: 0.3921568627
    on_value:
      - lvgl.label.update:
          id: selected_light_brightness
          text:
            format: "Lum : %.0f%%"
            args:
              - x


text_sensor:
  # Heure
  - platform: homeassistant
    id: current_time_ha
    entity_id: sensor.time
    internal: true
    on_value:
      - lvgl.label.update:
          id: display_time
          text:
            format: "%s"
            args:
              - x.c_str()


