# ─────────────────────────────────────────────────────────────
# LUMINOSITÉ → panneau (label + slider si sélectionné)
# ─────────────────────────────────────────────────────────────
sensor:

  - platform: homeassistant
    id: bureau_brightness
    entity_id: light.ampoule_bureau
    attribute: brightness
    internal: true
    filters:
      - multiply: 0.3921568627
    on_value:
      - lambda: |-
          float pct = x / 100.0f;
          uint8_t r = (uint8_t)(0xFF * (0.25f + 0.75f * pct));
          uint8_t g = (uint8_t)(0x8C * (0.25f + 0.75f * pct));
          uint32_t tc = ((uint32_t)r << 16) | ((uint32_t)g << 8);
          lv_obj_set_style_bg_color(id(bureau_light_btn), lv_color_hex(tc), LV_PART_MAIN | LV_STATE_CHECKED);
      - if:
          condition:
            lambda: 'return id(selected_light_valid) && id(selected_light) == "light.ampoule_bureau";'
          then:
            - lvgl.label.update:
                id: selected_light_brightness
                text:
                  format: "Lum : %.0f%%"
                  args: [ x ]
            - lambda: 'lv_slider_set_value(id(brightness_slider), (int)x, LV_ANIM_OFF);'

