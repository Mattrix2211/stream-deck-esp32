binary_sensor:

  - platform: homeassistant
    id: bureau_light_state
    entity_id: light.ampoule_bureau
    trigger_on_initial_state: true
    on_state:
      - lvgl.widget.update:
          id: bureau_light_btn
          state: { checked: !lambda 'return x;' }
      - if:
          condition:
            lambda: 'return id(selected_light_valid) && id(selected_light) == "light.ampoule_bureau";'
          then:
            - lambda: 'id(selected_light_is_on) = x;'
            - lvgl.widget.update:
                id: light_toggle_switch
