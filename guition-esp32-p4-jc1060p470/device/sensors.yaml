globals:
  - id: selected_light
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: selected_light_name
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: selected_light_is_dimmable
    type: bool
    restore_value: false
    initial_value: "false"
  - id: selected_light_is_switch
    type: bool
    restore_value: false
    initial_value: "false"
  - id: selected_light_valid
    type: bool
    restore_value: false
    initial_value: "false"
  - id: selected_light_is_on
    type: bool
    restore_value: false
    initial_value: "false"
  - id: selected_light_is_rgb
    type: bool
    restore_value: false
    initial_value: "false"
  - id: sel_hue
    type: int
    restore_value: false
    initial_value: "0"
  - id: sel_sat
    type: int
    restore_value: false
    initial_value: "100"
  - id: selected_light_is_color_temp
    type: bool
    restore_value: false
    initial_value: "false"
  - id: sel_color_temp_kelvin
    type: int
    restore_value: false
    initial_value: "4000"

script:
  # Réinitialise le panneau — aucune lampe sélectionnée
  - id: reset_light_context
    then:
      - lambda: |-
          id(selected_light).clear();
          id(selected_light_name).clear();
          id(selected_light_is_dimmable) = false;
          id(selected_light_is_switch) = false;
          id(selected_light_valid) = false;
          id(selected_light_is_on) = false;
          id(selected_light_is_rgb) = false;
          id(selected_light_is_color_temp) = false;
      - lvgl.label.update:
          id: selected_light_title
          text: "Sélectionner\nune lumière"
      - lvgl.label.update:
          id: selected_light_brightness
          text: "Lum : --"
      - lvgl.widget.update:
          id: light_toggle_switch
          state: { checked: false, disabled: true }
      - lvgl.widget.update:
          id: brightness_slider
          state: { disabled: true }
      - lvgl.widget.update:
          id: color_section
          hidden: true
      - lvgl.widget.update:
          id: color_temp_section
          hidden: true

  # Sélectionne une lampe — appel depuis on_long_press
  - id: select_light_context
    parameters:
      entity_id: string
      display_name: string
      is_dimmable: bool
      is_switch: bool
      is_rgb: bool
      is_color_temp: bool
    then:
      - lambda: |-
          id(selected_light) = entity_id;
          id(selected_light_name) = display_name;
          id(selected_light_is_dimmable) = is_dimmable;
          id(selected_light_is_switch) = is_switch;
          id(selected_light_valid) = true;
          id(selected_light_is_rgb) = is_rgb;
          id(selected_light_is_color_temp) = is_color_temp;
      - lvgl.label.update:
          id: selected_light_title
          text:
            format: "%s"
            args: [ display_name.c_str() ]
      - lvgl.widget.update:
          id: light_toggle_switch
          state:
            checked: !lambda 'return id(selected_light_is_on);'
            disabled: false
      - if:
          condition:
            lambda: 'return is_dimmable;'
          then:
            - lvgl.widget.update:
                id: brightness_slider
                state: { disabled: false }
            - lvgl.label.update: { id: selected_light_brightness, text: "Lum : --" }
          else:
            - lvgl.widget.update:
                id: brightness_slider
                state: { disabled: true }
            - lvgl.label.update: { id: selected_light_brightness, text: "Lum : N/A" }
      - if:
          condition:
            lambda: 'return is_rgb;'
          then:
            - lvgl.widget.update:
                id: color_section
                hidden: false
          else:
            - lvgl.widget.update:
                id: color_section
                hidden: true
      - if:
          condition:
            lambda: 'return is_color_temp;'
          then:
            - lvgl.widget.update:
                id: color_temp_section
                hidden: false
          else:
            - lvgl.widget.update:
                id: color_temp_section
                hidden: true
      - lvgl.page.show: light_control_page

  # Applique un preset de luminosité sur la lampe sélectionnée (gardé pour compatibilité)
  - id: set_selected_light_brightness
    parameters:
      brightness_pct: int
    then:
      - if:
          condition:
            lambda: 'return id(selected_light_valid) && id(selected_light_is_dimmable) && !id(selected_light_is_switch);'
          then:
            - homeassistant.service:
                service: light.turn_on
                data:
                  entity_id: !lambda 'return id(selected_light);'
                  brightness_pct: !lambda 'return brightness_pct;'


