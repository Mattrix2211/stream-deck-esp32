# ─────────────────────────────────────────────────────────────
# LUMINOSITÉ → panneau (uniquement si lampe sélectionnée)
# ─────────────────────────────────────────────────────────────
sensor:

  - platform: homeassistant
    id: bureau_brightness
    entity_id: light.ampoule_bureau
    attribute: brightness
    internal: true
    filters:
      - multiply: 0.3921568627
    on_value:
      - if:
          condition:
            lambda: 'return id(selected_light_valid) && id(selected_light) == "light.ampoule_bureau";'
          then:
            - lvgl.label.update:
