lvgl:
  displays: my_display
  byte_order: little_endian

  style_definitions:
    - id: scene_lights_off
      bg_color: "0x280808"
    - id: scene_lights_on
      bg_color: "0x261808"
    - id: scene_pc
      bg_color: "0x08101E"

  # ─────────────────────────────────────────────────────────────
  # COUCHE SUPÉRIEURE — visible sur toutes les pages
  # ─────────────────────────────────────────────────────────────
  top_layer:
    widgets:

      # Fond de la barre de navigation
      - obj:
          id: topbar_bg
          align: top_left
          x: 0
          y: 0
          width: 100%
          height: 46
          bg_color: 0x141726
          bg_opa: cover
          border_width: 0
          radius: 0

      - label:
          text: "-° / -°"
          id: temperatures
          text_font: clockbar_font
          align: top_left
          x: 26
          y: 11
          text_color: 0xC8D0E0

      # Pastille connexion HA
      - obj:
          id: conn_indicator
          align: top_left
          x: 10
          y: 17
          width: 12
          height: 12
          radius: 6
          bg_color: 0x00BB44
          bg_opa: COVER
          border_width: 0

      - label:
          text: "--:--"
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 11
          text_align: center
          text_color: 0xFFFFFF

      # Tab — Lumières
      - button:
          id: nav_lights_btn
          align: top_right
          x: -218
          y: 4
          height: 34
          width: 104
          checkable: true
          styles: control
          on_click:
            - lvgl.page.show: lights_page
          widgets:
            - label:
                text: "Lumières"
                align: center
                text_font: label_font
                text_color: 0xFFFFFF

      # Tab — Scènes / PC
      - button:
          id: nav_scenes_btn
          align: top_right
          x: -108
          y: 4
          height: 34
          width: 100
          checkable: true
          styles: control
          on_click:
            - lvgl.page.show: scenes_page
          widgets:
            - label:
                text: "PC & Plus"
                align: center
                text_font: label_font
                text_color: 0xFFFFFF

  pages:

    # ═════════════════════════════════════════════
    # PAGE 1 — LUMIÈRES
    # Appui court : toggle | Appui long : contrôle
    # Glisser gauche → page Scènes
    # ═════════════════════════════════════════════
    - id: lights_page
      scrollbar_mode: 'off'
      layout:
        type: flex
        flex_flow: row_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: 0x0D1117
      bg_opa: cover
      pad_top: 48
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      on_load:
        - lvgl.widget.update:
            id: nav_lights_btn
            state: { checked: true }
        - lvgl.widget.update:
            id: nav_scenes_btn
            state: { checked: false }
      on_gesture:
        - lvgl.page.show: scenes_page

      widgets:

        # ── Bureau ──────────────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: bureau_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $lightbulb
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Bureau"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.ampoule_bureau
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(bureau_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.ampoule_bureau"
                  display_name: "Bureau"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: false
                  is_color_temp: true

        # ── Fado bureau ─────────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: fado_bureau_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $nightlight
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Fado bureau"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010dc8ba13
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(fado_bureau_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.0x001788010dc8ba13"
                  display_name: "Fado bureau"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: true
                  is_color_temp: false

        # ── Chambre ─────────────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: chambre_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $bed
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Chambre"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010c014263
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(chambre_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.0x001788010c014263"
                  display_name: "Chambre"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: true
                  is_color_temp: false

        # ── Led chambre ─────────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: led_chambre_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $ledstrip
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Led chambre"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010c58b8f2
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(led_chambre_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.0x001788010c58b8f2"
                  display_name: "Led chambre"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: true
                  is_color_temp: false

        # ── Salon ───────────────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: salon_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $sofa
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Salon"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x00178801062d1c11
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(salon_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.0x00178801062d1c11"
                  display_name: "Salon"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: true
                  is_color_temp: false

        # ── Salle à manger ──────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: salle_manger_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $fork_knife
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Salle à manger"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010dc8c061
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(salle_manger_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.0x001788010dc8c061"
                  display_name: "Salle à manger"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: true
                  is_color_temp: false

        # ── La boule ────────────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: la_boule_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $lamp
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "La boule"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.la_boule
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(la_boule_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.la_boule"
                  display_name: "La boule"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: true
                  is_color_temp: false

        # ── Salle de bain ───────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: salle_bain_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $shower
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Salle de bain"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010c0adbc8
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(salle_bain_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.0x001788010c0adbc8"
                  display_name: "Salle de bain"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: true
                  is_color_temp: false

        # ── Cuisine ─────────────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: cuisine_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $fork_knife
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Cuisine"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010c2dee03
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(cuisine_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.0x001788010c2dee03"
                  display_name: "Cuisine"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: false
                  is_color_temp: true

        # ── Led cuisine ─────────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: led_cuisine_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $ledstrip
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Led cuisine"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010d0b3aa9
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(led_cuisine_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.0x001788010d0b3aa9"
                  display_name: "Led cuisine"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: true
                  is_color_temp: false

        # ── Couloir ─────────────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: couloir_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $door_closed
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Couloir"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010c2de07e
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(couloir_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.0x001788010c2de07e"
                  display_name: "Couloir"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: false
                  is_color_temp: true

        # ── Lampe couloir (prise) ───────────────
        - button:
            height: $button_height
