lvgl:
  displays: my_display
  byte_order: little_endian

  top_layer:
    widgets:

      # Temperature
      - label:
          text: "-° / -°"
          id: temperatures
          text_font: clockbar_font
          align: top_left
          x: 8
          y: 8
          text_color: 0xFFFFFF

      # Clock
      - label:
          text: "--:--"
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 8
          text_align: center
          text_color: 0xFFFFFF

  pages:
    - id: main_page
      layout:
        type: flex
        flex_flow: column_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 42
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:

        # Bureau
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_scene_features_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: scene_features_icon
                  text: $lightbulb
              - label:
                  align: bottom_left
                  id: scene_features_label
                  text: "Bureau"
            on_press:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.ampoule_bureau
            on_long_press:
              - lvgl.label.update:
                  id: selected_light_title
                  text: "Bureau"
              - lvgl.label.update:
                  id: selected_light_toggle_label
                  text: "Allumer / Éteindre"
              - lvgl.label.update:
                  id: selected_light_brightness
                  text: "Lum : --"

        # Fado bureau
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_scene_calls_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: office_scene_calls_icon
                  text: $lightbulb
              - label:
                  align: bottom_left
                  id: office_scene_calls_label
                  text: "Fado bureau"
            on_press:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010dc8ba13

        # Chambre
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_scene_evening_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: office_scene_evening_icon
                  text: $lightbulb
              - label:
                  align: bottom_left
                  id: office_scene_evening_label
                  text: "Chambre"
            on_press:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010c014263

        # Led chambre
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_scene_dimmed_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: office_scene_dimmed_icon
                  text: $ledstrip
              - label:
                  align: bottom_left
                  id: office_scene_dimmed_label
                  text: "Led chambre"
            on_press:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010c58b8f2

        # Salon
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_blind_open_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Salon"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x00178801062d1c11

        # Salle à manger
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_blind_66_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Salle à manger"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010dc8c061

        # La boule
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_blind_33_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "La boule"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.la_boule

        # Salle de bain
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_blind_close_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Salle de bain"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010c0adbc8

        # Cuisine
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: printer_power_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: printer_power_icon
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Cuisine"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010c2dee03

        # Led cuisine
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: filament_heater_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: filament_heater_icon
                  text: $ledstrip
              - label:
                  align: bottom_left
                  text: "Led cuisine"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010d0b3aa9

        # Couloir
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_aircon_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Couloir"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010c2de07e

        # Lampe couloir
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: battery_charger_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: battery_charger_icon
                  text: $lightbulb
              - label:
                  align: bottom_left
                  id: battery_charger_label
                  text: "Lampe couloir"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.lampe_couloir


        # Panneau latéral
        - obj:
            id: side_panel
            width: 250
            height: 100%
            bg_color: 0x111111
            bg_opa: COVER
            radius: 12
            pad_all: 14
            border_width: 1
            border_color: 0x2A2A2A
            layout:
              type: flex
              flex_flow: column
              pad_row: 12
            widgets:
              - label:
                  id: selected_light_title
                  text: "TEST PANNEAU"
                  text_color: 0xFFFFFF

              - button:
                  id: selected_light_toggle_button
                  height: 48
                  width: 100%
                  styles: control
                  on_press:
                    - homeassistant.service:
                        service: light.toggle
                        data:
                          entity_id: light.ampoule_bureau
                  widgets:
                    - label:
                        id: selected_light_toggle_label
                        text: "ON / OFF"
                        align: center

              - label:
                  id: selected_light_brightness
                  text: "Lum : --"
                  text_color: 0xCCCCCC

              - obj:
                  width: 100%
                  height: SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: row
                    pad_column: 8
                  widgets:
                    - button:
                        id: quick_25_button
                        height: 44
                        width: 70
                        styles: control
                        on_press:
                          - homeassistant.service:
                              service: light.turn_on
                              data:
                                entity_id: light.ampoule_bureau
                                brightness_pct: "25"
                        widgets:
                          - label:
                              text: "25%"
                              align: center

                    - button:
                        id: quick_50_button
                        height: 44
                        width: 70
                        styles: control
                        on_press:
                          - homeassistant.service:
                              service: light.turn_on
                              data:
                                entity_id: light.ampoule_bureau
                                brightness_pct: "50"
                        widgets:
                          - label:
                              text: "50%"
                              align: center

                    - button:
                        id: quick_100_button
                        height: 44
                        width: 70
                        styles: control
                        on_press:
                          - homeassistant.service:
                              service: light.turn_on
                              data:
                                entity_id: light.ampoule_bureau
                                brightness_pct: "100"
                        widgets:
                          - label:
                              text: "100%"
                              align: center
