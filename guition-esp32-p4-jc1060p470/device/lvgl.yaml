              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Led chambre"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010c58b8f2
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(led_chambre_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.0x001788010c58b8f2"
                  display_name: "Led chambre"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: true
                  is_color_temp: false

        # ── Salon ───────────────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: salon_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $sofa
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Salon"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x00178801062d1c11
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(salon_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.0x00178801062d1c11"
                  display_name: "Salon"
                  is_dimmable: true
