lvgl:
  displays: my_display
  byte_order: little_endian

  # ─────────────────────────────────────────────────────────────
  # COUCHE SUPÉRIEURE — visible sur toutes les pages
  # ─────────────────────────────────────────────────────────────
  top_layer:
    widgets:

      # Fond de la barre de navigation (dessiné en premier = derrière)
      - obj:
          id: topbar_bg
          align: top_left
          x: 0
          y: 0
          width: 100%
          height: 46
          bg_color: 0x141726
          bg_opa: cover
          border_width: 0
          radius: 0

      - label:
          text: "-° / -°"
          id: temperatures
          text_font: clockbar_font
          align: top_left
          x: 8
          y: 8
          text_color: 0xFFFFFF

      # Pastille connexion HA (verte = OK, rouge = déconnecté)
      - obj:
          id: conn_indicator
          align: top_left
          x: 8
          y: 34
          width: 10
          height: 10
          radius: 5
          bg_color: 0x00BB44
          bg_opa: COVER
          border_width: 0

      - label:
          text: "--:--"
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 8
          text_align: center
          text_color: 0xFFFFFF

      # Tab — Lumières
      - button:
          id: nav_lights_btn
          align: top_right
          x: -218
          y: 4
          height: 34
          width: 104
          checkable: true
          styles: control
          on_click:
            - lvgl.page.show: lights_page
          widgets:
            - label:
                text: "Lumières"
                align: center
                text_font: label_font
                text_color: 0xFFFFFF

      # Tab — Scènes / PC
      - button:
          id: nav_scenes_btn
          align: top_right
          x: -108
          y: 4
          height: 34
          width: 100
          checkable: true
          styles: control
          on_click:
            - lvgl.page.show: scenes_page
          widgets:
            - label:
                text: "PC & Plus"
                align: center
                text_font: label_font
                text_color: 0xFFFFFF

  pages:

    # ═════════════════════════════════════════════
    # PAGE 1 — LUMIÈRES
    # Appui court : toggle | Appui long : sélection
    # ═════════════════════════════════════════════
    - id: lights_page
      layout:
        type: flex
        flex_flow: column_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: 0x0D1117
      bg_opa: cover
      pad_top: 48
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      on_load:
        - lvgl.widget.update:
            id: nav_lights_btn
            state: { checked: true }
        - lvgl.widget.update:
            id: nav_scenes_btn
            state: { checked: false }
        # Rendre le fond/indicateur du slider teinte transparents
        # Le curseur seul reste visible sur le fond arc-en-ciel
        - lambda: |-
            // Hue slider — fond et indicateur transparents, curseur blanc
            lv_obj_set_style_bg_opa(id(hue_slider), LV_OPA_TRANSP, LV_PART_MAIN);
            lv_obj_set_style_border_opa(id(hue_slider), LV_OPA_TRANSP, LV_PART_MAIN);
            lv_obj_set_style_shadow_opa(id(hue_slider), LV_OPA_TRANSP, LV_PART_MAIN);
            lv_obj_set_style_bg_opa(id(hue_slider), LV_OPA_TRANSP, LV_PART_INDICATOR);
            lv_obj_set_style_bg_color(id(hue_slider), lv_color_white(), LV_PART_KNOB);
            lv_obj_set_style_border_color(id(hue_slider), lv_color_black(), LV_PART_KNOB);
            lv_obj_set_style_border_width(id(hue_slider), 2, LV_PART_KNOB);
            lv_obj_set_style_pad_all(id(hue_slider), 7, LV_PART_KNOB);
            // Color temp slider — même traitement
            lv_obj_set_style_bg_opa(id(color_temp_slider), LV_OPA_TRANSP, LV_PART_MAIN);
            lv_obj_set_style_border_opa(id(color_temp_slider), LV_OPA_TRANSP, LV_PART_MAIN);
            lv_obj_set_style_shadow_opa(id(color_temp_slider), LV_OPA_TRANSP, LV_PART_MAIN);
            lv_obj_set_style_bg_opa(id(color_temp_slider), LV_OPA_TRANSP, LV_PART_INDICATOR);
            lv_obj_set_style_bg_color(id(color_temp_slider), lv_color_white(), LV_PART_KNOB);
            lv_obj_set_style_border_color(id(color_temp_slider), lv_color_black(), LV_PART_KNOB);
            lv_obj_set_style_border_width(id(color_temp_slider), 2, LV_PART_KNOB);
            lv_obj_set_style_pad_all(id(color_temp_slider), 7, LV_PART_KNOB);

      widgets:

        # ── Bureau ──────────────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: bureau_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $lightbulb
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Bureau"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.ampoule_bureau
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(bureau_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.ampoule_bureau"
                  display_name: "Bureau"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: false
                  is_color_temp: true

        # ── Fado bureau ─────────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: fado_bureau_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $nightlight
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Fado bureau"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010dc8ba13
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(fado_bureau_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.0x001788010dc8ba13"
                  display_name: "Fado bureau"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: true
                  is_color_temp: false

        # ── Chambre ─────────────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: chambre_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $bed
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Chambre"
            on_click:
              - homeassistant.service:
