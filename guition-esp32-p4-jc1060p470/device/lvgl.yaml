            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $floor_lamp
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Lampe couloir"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.lampe_couloir
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(lampe_couloir_switch_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "switch.lampe_couloir"
                  display_name: "Lampe couloir"
                  is_dimmable: false
                  is_switch: true
                  is_rgb: false
                  is_color_temp: false


    # ═════════════════════════════════════════════
    # PAGE 2 — PC & PLUS
    # Glisser droite → page Lumières
    # ═════════════════════════════════════════════
    - id: scenes_page
      scrollbar_mode: 'off'
      layout:
        type: flex
        flex_flow: row_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: 0x0D1117
      bg_opa: cover
      pad_top: 48
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      on_load:
        - lvgl.widget.update:
            id: nav_lights_btn
            state: { checked: false }
        - lvgl.widget.update:
            id: nav_scenes_btn
            state: { checked: true }
        - script.execute: reset_light_context
      on_gesture:
        - lvgl.page.show: lights_page

      widgets:

        # ── Tout éteindre ───────────────────────
        - button:
            height: 200
            width: 340
            id: all_lights_off_btn
            styles: [control, scene_lights_off]
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $lightbulb_off
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Tout éteindre"
            on_click:
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.ampoule_bureau
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x001788010dc8ba13
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x001788010c014263
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x001788010c58b8f2
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x00178801062d1c11
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x001788010dc8c061
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.la_boule
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x001788010c0adbc8
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x001788010c2dee03
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x001788010d0b3aa9
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x001788010c2de07e
              - homeassistant.service:
                  service: switch.turn_off
                  data:
                    entity_id: switch.lampe_couloir

        # ── Tout allumer ────────────────────────
        - button:
            height: 200
            width: 340
            id: all_lights_on_btn
            styles: [control, scene_lights_on]
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $lightbulb_group
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Tout allumer"
            on_click:
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.ampoule_bureau
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x001788010dc8ba13
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x001788010c014263
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x001788010c58b8f2
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x00178801062d1c11
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x001788010dc8c061
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.la_boule
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x001788010c0adbc8
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x001788010c2dee03
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x001788010d0b3aa9
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x001788010c2de07e
              - homeassistant.service:
                  service: switch.turn_on
                  data:
                    entity_id: switch.lampe_couloir

        # ── Allumer le PC ───────────────────────
        - button:
            height: 200
            width: 340
            id: pc_wake_btn
            styles: [control, scene_pc]
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $monitor
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Allumer PC"
            on_click:
              - homeassistant.service:
                  service: wake_on_lan.send_magic_packet
                  data:
                    mac: "XX:XX:XX:XX:XX:XX"

        # ── Éteindre le PC ──────────────────────
        - button:
            height: 200
            width: 340
            id: pc_shutdown_btn
            styles: [control, scene_pc]
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $power
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Éteindre PC"
            on_click:
              - homeassistant.service:
                  service: button.press
                  data:
                    entity_id: button.pc_shutdown

        # ── Veille PC ───────────────────────────
        - button:
            height: 200
            width: 340
            id: pc_sleep_btn
            styles: [control, scene_pc]
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $sleep
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Veille PC"
            on_click:
              - homeassistant.service:
                  service: button.press
                  data:
                    entity_id: button.pc_sleep

        # ── Redémarrer PC ───────────────────────
        - button:
            height: 200
            width: 340
            id: pc_restart_btn
            styles: [control, scene_pc]
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $restart
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Redémarrer PC"
            on_click:
              - homeassistant.service:
                  service: button.press
                  data:
                    entity_id: button.pc_restart


    # ═════════════════════════════════════════════
    # PAGE 3 — CONTRÔLE LUMIÈRE (plein écran)
    # Ouvert par appui long sur un bouton lumière
    # Glisser droite → retour page Lumières
    # ═════════════════════════════════════════════
    - id: light_control_page
      scrollbar_mode: 'off'
      bg_color: 0x0D1117
      bg_opa: cover
      pad_top: 56
      pad_left: 30
      pad_right: 30
      pad_bottom: 16
      layout:
        type: flex
        flex_flow: column
        flex_align_main: start
        pad_row: 14
      on_load:
        - lvgl.widget.update:
            id: nav_lights_btn
            state: { checked: true }
        - lvgl.widget.update:
            id: nav_scenes_btn
            state: { checked: false }
        - lambda: |-
            lv_obj_set_style_bg_opa(id(hue_slider), LV_OPA_TRANSP, LV_PART_MAIN);
            lv_obj_set_style_border_opa(id(hue_slider), LV_OPA_TRANSP, LV_PART_MAIN);
            lv_obj_set_style_shadow_opa(id(hue_slider), LV_OPA_TRANSP, LV_PART_MAIN);
            lv_obj_set_style_bg_opa(id(hue_slider), LV_OPA_TRANSP, LV_PART_INDICATOR);
            lv_obj_set_style_bg_color(id(hue_slider), lv_color_white(), LV_PART_KNOB);
            lv_obj_set_style_border_color(id(hue_slider), lv_color_black(), LV_PART_KNOB);
            lv_obj_set_style_border_width(id(hue_slider), 2, LV_PART_KNOB);
            lv_obj_set_style_pad_all(id(hue_slider), 7, LV_PART_KNOB);
            lv_obj_set_style_bg_opa(id(color_temp_slider), LV_OPA_TRANSP, LV_PART_MAIN);
            lv_obj_set_style_border_opa(id(color_temp_slider), LV_OPA_TRANSP, LV_PART_MAIN);
            lv_obj_set_style_shadow_opa(id(color_temp_slider), LV_OPA_TRANSP, LV_PART_MAIN);
            lv_obj_set_style_bg_opa(id(color_temp_slider), LV_OPA_TRANSP, LV_PART_INDICATOR);
            lv_obj_set_style_bg_color(id(color_temp_slider), lv_color_white(), LV_PART_KNOB);
            lv_obj_set_style_border_color(id(color_temp_slider), lv_color_black(), LV_PART_KNOB);
            lv_obj_set_style_border_width(id(color_temp_slider), 2, LV_PART_KNOB);
            lv_obj_set_style_pad_all(id(color_temp_slider), 7, LV_PART_KNOB);
      on_gesture:
        - lvgl.page.show: lights_page

      widgets:

        # ── En-tête : nom de la lampe + interrupteur ──────────
        - obj:
            width: 100%
            height: SIZE_CONTENT
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            layout:
              type: flex
              flex_flow: row
              flex_align_cross: center
              pad_column: 16
            widgets:
              - label:
                  id: selected_light_title
                  flex_grow: 1
                  text: "─"
                  text_color: 0xFFFFFF
                  text_font: statistics_font
                  text_align: center
                  long_mode: dot
              - switch:
                  id: light_toggle_switch
                  width: 80
                  height: 44
                  state:
                    disabled: true
                  on_value:
                    - if:
                        condition:
                          lambda: 'return id(selected_light_valid);'
                        then:
                          - homeassistant.service:
                              service: !lambda |-
                                return id(selected_light_is_switch)
                                  ? (x ? "switch.turn_on" : "switch.turn_off")
                                  : (x ? "light.turn_on" : "light.turn_off");
                              data:
                                entity_id: !lambda 'return id(selected_light);'

        # Séparateur
        - obj:
            width: 100%
            height: 1
            bg_color: 0x262A3F
            bg_opa: COVER
            border_width: 0
            pad_all: 0

        # ── Luminosité ────────────────────────────────────────
        - obj:
            width: 100%
            height: SIZE_CONTENT
            bg_color: 0x141726
            radius: 12
            border_width: 1
            border_color: 0x262A3F
            pad_all: 16
            layout:
              type: flex
              flex_flow: column
              pad_row: 10
            widgets:
              - obj:
                  width: 100%
                  height: SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: center
                  widgets:
                    - label:
                        text: "Luminosité"
                        text_color: 0x8892B0
                        flex_grow: 1
                    - label:
                        id: selected_light_brightness
                        text: "--"
                        text_color: 0xFFFFFF
              - slider:
                  id: brightness_slider
                  width: 100%
                  height: 30
                  min_value: 0
                  max_value: 100
                  value: 0
                  state:
                    disabled: true
                  on_release:
                    - if:
                        condition:
                          lambda: 'return id(selected_light_valid) && id(selected_light_is_dimmable) && !id(selected_light_is_switch);'
                        then:
                          - homeassistant.service:
                              service: light.turn_on
                              data:
                                entity_id: !lambda 'return id(selected_light);'
                                brightness_pct: !lambda 'return lv_slider_get_value(id(brightness_slider));'

        # ── Température de couleur (visible si is_color_temp) ─
        - obj:
            id: color_temp_section
            width: 100%
            height: SIZE_CONTENT
            bg_color: 0x141726
            radius: 12
            border_width: 1
            border_color: 0x262A3F
            pad_all: 16
            hidden: true
            layout:
              type: flex
              flex_flow: column
              pad_row: 10
            widgets:
              - label:
                  text: "Température de couleur"
                  text_color: 0x8892B0

              # Gradient chaud→froid + slider transparent superposé
              - obj:
                  width: 100%
                  height: 30
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - obj:
                        align: left_mid
                        x: 0
                        y: 0
                        width: 100%
                        height: 30
                        border_width: 0
                        pad_all: 0
                        radius: 4
                        layout:
                          type: flex
                          flex_flow: row
                          pad_row: 0
                          pad_column: 0
                        widgets:
                          - obj:
                              height: 30
                              flex_grow: 1
                              bg_color: 0xFF9D42
                              border_width: 0
                              radius: 0
                              pad_all: 0
                          - obj:
                              height: 30
                              flex_grow: 1
                              bg_color: 0xFFB870
                              border_width: 0
                              radius: 0
                              pad_all: 0
                          - obj:
                              height: 30
                              flex_grow: 1
                              bg_color: 0xFFCF9A
                              border_width: 0
                              radius: 0
                              pad_all: 0
                          - obj:
                              height: 30
                              flex_grow: 1
                              bg_color: 0xFFE8C8
                              border_width: 0
                              radius: 0
                              pad_all: 0
                          - obj:
                              height: 30
                              flex_grow: 1
                              bg_color: 0xFFF5E8
                              border_width: 0
                              radius: 0
                              pad_all: 0
                          - obj:
                              height: 30
                              flex_grow: 1
                              bg_color: 0xFFFEFA
                              border_width: 0
                              radius: 0
                              pad_all: 0
                    - slider:
                        id: color_temp_slider
                        align: center
                        x: 0
                        y: 0
                        width: 100%
                        height: 30
                        min_value: 2700
                        max_value: 6500
                        value: 4000
                        on_release:
                          - if:
                              condition:
                                lambda: 'return id(selected_light_valid) && id(selected_light_is_color_temp);'
                              then:
                                - lambda: 'id(sel_color_temp_kelvin) = lv_slider_get_value(id(color_temp_slider));'
                                - homeassistant.service:
                                    service: light.turn_on
                                    data:
                                      entity_id: !lambda 'return id(selected_light);'
                                      kelvin: !lambda 'return id(sel_color_temp_kelvin);'

        # ── Couleur RGB (visible si is_rgb) ───────────────────
        - obj:
            id: color_section
            width: 100%
            height: SIZE_CONTENT
            bg_color: 0x141726
            radius: 12
            border_width: 1
            border_color: 0x262A3F
            pad_all: 16
            hidden: true
            layout:
              type: flex
              flex_flow: column
              pad_row: 10
            widgets:

              # Aperçu couleur en temps réel
              - obj:
                  id: color_preview
                  width: 100%
                  height: 32
                  radius: 8
                  border_width: 1
                  border_color: 0x262A3F
                  bg_color: 0xFFFFFF

              - label:
                  text: "Teinte"
                  text_color: 0x8892B0

              # Arc-en-ciel 12 segments + slider transparent
              - obj:
                  width: 100%
                  height: 30
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - obj:
                        align: left_mid
                        x: 0
                        y: 0
                        width: 100%
                        height: 30
                        border_width: 0
                        pad_all: 0
                        radius: 4
                        layout:
                          type: flex
                          flex_flow: row
                          pad_row: 0
                          pad_column: 0
                        widgets:
                          - obj: { height: 30, flex_grow: 1, bg_color: 0xFF0000, border_width: 0, radius: 0, pad_all: 0 }
                          - obj: { height: 30, flex_grow: 1, bg_color: 0xFF7F00, border_width: 0, radius: 0, pad_all: 0 }
                          - obj: { height: 30, flex_grow: 1, bg_color: 0xFFFF00, border_width: 0, radius: 0, pad_all: 0 }
                          - obj: { height: 30, flex_grow: 1, bg_color: 0x80FF00, border_width: 0, radius: 0, pad_all: 0 }
                          - obj: { height: 30, flex_grow: 1, bg_color: 0x00FF00, border_width: 0, radius: 0, pad_all: 0 }
                          - obj: { height: 30, flex_grow: 1, bg_color: 0x00FF80, border_width: 0, radius: 0, pad_all: 0 }
                          - obj: { height: 30, flex_grow: 1, bg_color: 0x00FFFF, border_width: 0, radius: 0, pad_all: 0 }
                          - obj: { height: 30, flex_grow: 1, bg_color: 0x0080FF, border_width: 0, radius: 0, pad_all: 0 }
                          - obj: { height: 30, flex_grow: 1, bg_color: 0x0000FF, border_width: 0, radius: 0, pad_all: 0 }
                          - obj: { height: 30, flex_grow: 1, bg_color: 0x8000FF, border_width: 0, radius: 0, pad_all: 0 }
                          - obj: { height: 30, flex_grow: 1, bg_color: 0xFF00FF, border_width: 0, radius: 0, pad_all: 0 }
                          - obj: { height: 30, flex_grow: 1, bg_color: 0xFF0080, border_width: 0, radius: 0, pad_all: 0 }
                    - slider:
                        id: hue_slider
                        align: center
                        x: 0
                        y: 0
                        width: 100%
                        height: 30
                        min_value: 0
                        max_value: 360
                        value: 0
                        on_value:
                          - lambda: |-
                              id(sel_hue) = lv_slider_get_value(id(hue_slider));
                              int h = id(sel_hue), s = id(sel_sat);
                              float hf = h / 60.0f;
                              float sf = s / 100.0f;
                              int hi = (int)hf % 6;
                              float f = hf - (int)hf;
                              float p = 1.0f - sf, q = 1.0f - f*sf, t = 1.0f - (1.0f-f)*sf;
                              float r, g, b;
                              switch(hi) {
                                case 0: r=1;g=t;b=p; break;
                                case 1: r=q;g=1;b=p; break;
                                case 2: r=p;g=1;b=t; break;
                                case 3: r=p;g=q;b=1; break;
                                case 4: r=t;g=p;b=1; break;
                                default: r=1;g=p;b=q; break;
                              }
                              uint32_t c=((uint32_t)(r*255)<<16)|((uint32_t)(g*255)<<8)|(uint32_t)(b*255);
                              lv_obj_set_style_bg_color(id(color_preview), lv_color_hex(c), LV_PART_MAIN);
                        on_release:
                          - if:
                              condition:
                                lambda: 'return id(selected_light_valid) && id(selected_light_is_rgb);'
                              then:
                                - homeassistant.service:
                                    service: light.turn_on
                                    data_template:
                                      entity_id: "{{ entity }}"
                                      hs_color: "{{ [hs_hue|float, hs_sat|float] }}"
                                    variables:
                                      entity: !lambda 'return id(selected_light);'
                                      hs_hue: !lambda 'return std::to_string(id(sel_hue));'
                                      hs_sat: !lambda 'return std::to_string(id(sel_sat));'

              - label:
                  text: "Saturation"
                  text_color: 0x8892B0

              - slider:
                  id: sat_slider
                  width: 100%
                  height: 20
                  min_value: 0
                  max_value: 100
                  value: 100
                  on_value:
                    - lambda: |-
                        id(sel_sat) = lv_slider_get_value(id(sat_slider));
                        int h = id(sel_hue), s = id(sel_sat);
                        float hf = h / 60.0f;
                        float sf = s / 100.0f;
                        int hi = (int)hf % 6;
                        float f = hf - (int)hf;
                        float p = 1.0f - sf, q = 1.0f - f*sf, t = 1.0f - (1.0f-f)*sf;
                        float r, g, b;
                        switch(hi) {
                          case 0: r=1;g=t;b=p; break;
                          case 1: r=q;g=1;b=p; break;
                          case 2: r=p;g=1;b=t; break;
                          case 3: r=p;g=q;b=1; break;
                          case 4: r=t;g=p;b=1; break;
                          default: r=1;g=p;b=q; break;
                        }
                        uint32_t c=((uint32_t)(r*255)<<16)|((uint32_t)(g*255)<<8)|(uint32_t)(b*255);
                        lv_obj_set_style_bg_color(id(color_preview), lv_color_hex(c), LV_PART_MAIN);
                  on_release:
                    - if:
                        condition:
                          lambda: 'return id(selected_light_valid) && id(selected_light_is_rgb);'
                        then:
                          - homeassistant.service:
                              service: light.turn_on
                              data_template:
                                entity_id: "{{ entity }}"
                                hs_color: "{{ [hs_hue|float, hs_sat|float] }}"
                              variables:
                                entity: !lambda 'return id(selected_light);'
                                hs_hue: !lambda 'return std::to_string(id(sel_hue));'
                                hs_sat: !lambda 'return std::to_string(id(sel_sat));'

        # ── Bouton retour ─────────────────────────────────────
        - button:
            height: 44
            width: 100%
            styles: control
            on_click:
              - script.execute: reset_light_context
              - lvgl.page.show: lights_page
            widgets:
              - label:
                  text: "Retour aux lumières"
                  align: center
                  text_color: 0x8892B0
