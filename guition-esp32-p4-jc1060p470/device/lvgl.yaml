            height: $button_height
            width: $button_width
            checkable: true
            id: cuisine_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $fork_knife
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Cuisine"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010c2dee03
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(cuisine_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.0x001788010c2dee03"
                  display_name: "Cuisine"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: false
                  is_color_temp: true

        # ── Led cuisine ─────────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: led_cuisine_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $ledstrip
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Led cuisine"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010d0b3aa9
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(led_cuisine_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.0x001788010d0b3aa9"
                  display_name: "Led cuisine"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: true
                  is_color_temp: false

        # ── Couloir ─────────────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: couloir_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $door_closed
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Couloir"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010c2de07e
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(couloir_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.0x001788010c2de07e"
                  display_name: "Couloir"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: false
                  is_color_temp: true

        # ── Lampe couloir (prise) ───────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lampe_couloir_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $floor_lamp
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Lampe couloir"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.lampe_couloir
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(lampe_couloir_switch_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "switch.lampe_couloir"
                  display_name: "Lampe couloir"
                  is_dimmable: false
                  is_switch: true
                  is_rgb: false
                  is_color_temp: false

        # ── Panneau de contrôle ─────────────────
        - obj:
            id: side_panel
            width: 250
            height: 100%
            bg_color: 0x141726
            bg_opa: COVER
            radius: 14
            pad_all: 14
            border_width: 1
            border_color: 0x262A3F
            layout:
              type: flex
              flex_flow: column
              flex_align_main: start
              pad_row: 12
            widgets:

              # Nom de la lampe sélectionnée
              - label:
                  id: selected_light_title
                  text: "Sélectionner\nune lumière"
                  text_color: 0xFFFFFF
                  long_mode: wrap
                  width: 100%

              # Switch toggle — style interrupteur
              # Désactivé tant qu'aucune lampe n'est sélectionnée
              # on_value : turn_on/turn_off (idempotent, évite les conflits)
              - switch:
                  id: light_toggle_switch
                  width: 80
                  height: 40
                  state:
                    disabled: true
                  on_value:
                    - if:
                        condition:
                          lambda: 'return id(selected_light_valid);'
                        then:
                          - homeassistant.service:
                              service: !lambda |-
                                return id(selected_light_is_switch)
                                  ? (x ? "switch.turn_on" : "switch.turn_off")
                                  : (x ? "light.turn_on" : "light.turn_off");
                              data:
                                entity_id: !lambda 'return id(selected_light);'

              # Luminosité actuelle
              - label:
                  id: selected_light_brightness
                  text: "Lum : --"
                  text_color: 0xAAAAAA

              # Slider luminosité (0-100%)
              - slider:
                  id: brightness_slider
                  width: 100%
                  height: 20
                  min_value: 0
                  max_value: 100
                  value: 0
                  state:
                    disabled: true
                  on_release:
                    - if:
                        condition:
                          lambda: 'return id(selected_light_valid) && id(selected_light_is_dimmable) && !id(selected_light_is_switch);'
                        then:
                          - homeassistant.service:
                              service: light.turn_on
                              data:
                                entity_id: !lambda 'return id(selected_light);'
                                brightness_pct: !lambda 'return lv_slider_get_value(id(brightness_slider));'

              # Section température de couleur (visible pour lampes non-RGB avec color_temp)
              - obj:
                  id: color_temp_section
                  width: 100%
                  height: SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  hidden: true
                  layout:
                    type: flex
                    flex_flow: column
                    pad_row: 8
                  widgets:

                    - label:
                        text: "Température"
                        text_color: 0xAAAAAA

                    # Gradient chaud→froid + slider transparent superposé
                    - obj:
                        width: 100%
                        height: 30
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        widgets:
                          - image:
                              src: color_temp_gradient_img
                              align: left_mid
                              x: 0
                              y: 0
                          - slider:
                              id: color_temp_slider
                              align: center
                              x: 0
                              y: 0
                              width: 100%
                              height: 30
                              min_value: 2700
                              max_value: 6500
                              value: 4000
                              on_release:
                                - if:
                                    condition:
                                      lambda: 'return id(selected_light_valid) && id(selected_light_is_color_temp);'
                                    then:
                                      - lambda: 'id(sel_color_temp_kelvin) = lv_slider_get_value(id(color_temp_slider));'
                                      - homeassistant.service:
                                          service: light.turn_on
                                          data:
                                            entity_id: !lambda 'return id(selected_light);'
                                            kelvin: !lambda 'return id(sel_color_temp_kelvin);'

              # Section couleur (visible uniquement pour les ampoules RGB)
              - obj:
                  id: color_section
                  width: 100%
                  height: SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  hidden: true
                  layout:
                    type: flex
                    flex_flow: column
                    pad_row: 8
                  widgets:

                    # Aperçu couleur en temps réel
                    - obj:
                        id: color_preview
                        width: 100%
                        height: 32
                        radius: 8
                        border_width: 1
                        border_color: 0x262A3F
                        bg_color: 0xFFFFFF

                    - label:
                        text: "Teinte"
                        text_color: 0xAAAAAA

                    # Arc-en-ciel : image de fond + slider transparent superposé
                    - obj:
                        width: 100%
                        height: 30
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        widgets:
                          # Fond arc-en-ciel (360x30 px, affiché en natif)
                          - image:
                              src: hue_gradient_img
                              align: left_mid
                              x: 0
                              y: 0
                          # Slider transparent — seul le curseur est visible
                          - slider:
                              id: hue_slider
                              align: center
                              x: 0
                              y: 0
                              width: 100%
                              height: 30
                              min_value: 0
                              max_value: 360
                              value: 0
                              on_value:
                                - lambda: |-
                                    id(sel_hue) = lv_slider_get_value(id(hue_slider));
                                    int h = id(sel_hue), s = id(sel_sat);
                                    float hf = h / 60.0f;
                                    float sf = s / 100.0f;
                                    int hi = (int)hf % 6;
                                    float f = hf - (int)hf;
                                    float p = 1.0f - sf, q = 1.0f - f*sf, t = 1.0f - (1.0f-f)*sf;
                                    float r, g, b;
                                    switch(hi) {
                                      case 0: r=1;g=t;b=p; break;
                                      case 1: r=q;g=1;b=p; break;
                                      case 2: r=p;g=1;b=t; break;
                                      case 3: r=p;g=q;b=1; break;
                                      case 4: r=t;g=p;b=1; break;
                                      default: r=1;g=p;b=q; break;
                                    }
                                    uint32_t c=((uint32_t)(r*255)<<16)|((uint32_t)(g*255)<<8)|(uint32_t)(b*255);
                                    lv_obj_set_style_bg_color(id(color_preview), lv_color_hex(c), LV_PART_MAIN);
                              on_release:
                                - if:
                                    condition:
                                      lambda: 'return id(selected_light_valid) && id(selected_light_is_rgb);'
                                    then:
                                      - homeassistant.service:
                                          service: light.turn_on
                                          data_template:
                                            entity_id: "{{ entity }}"
                                            hs_color: "{{ [hs_hue|float, hs_sat|float] }}"
                                          variables:
                                            entity: !lambda 'return id(selected_light);'
                                            hs_hue: !lambda 'return std::to_string(id(sel_hue));'
                                            hs_sat: !lambda 'return std::to_string(id(sel_sat));'

                    - label:
                        text: "Saturation"
                        text_color: 0xAAAAAA

                    # Slider saturation (0-100%)
                    - slider:
                        id: sat_slider
                        width: 100%
                        height: 20
                        min_value: 0
                        max_value: 100
                        value: 100
                        on_value:
                          - lambda: |-
                              id(sel_sat) = lv_slider_get_value(id(sat_slider));
                              int h = id(sel_hue), s = id(sel_sat);
                              float hf = h / 60.0f;
                              float sf = s / 100.0f;
                              int hi = (int)hf % 6;
                              float f = hf - (int)hf;
                              float p = 1.0f - sf, q = 1.0f - f*sf, t = 1.0f - (1.0f-f)*sf;
                              float r, g, b;
                              switch(hi) {
                                case 0: r=1;g=t;b=p; break;
                                case 1: r=q;g=1;b=p; break;
                                case 2: r=p;g=1;b=t; break;
                                case 3: r=p;g=q;b=1; break;
                                case 4: r=t;g=p;b=1; break;
                                default: r=1;g=p;b=q; break;
                              }
                              uint32_t c=((uint32_t)(r*255)<<16)|((uint32_t)(g*255)<<8)|(uint32_t)(b*255);
                              lv_obj_set_style_bg_color(id(color_preview), lv_color_hex(c), LV_PART_MAIN);
                        on_release:
                          - if:
                              condition:
                                lambda: 'return id(selected_light_valid) && id(selected_light_is_rgb);'
                              then:
                                - homeassistant.service:
                                    service: light.turn_on
                                    data_template:
                                      entity_id: "{{ entity }}"
                                      hs_color: "{{ [hs_hue|float, hs_sat|float] }}"
                                    variables:
                                      entity: !lambda 'return id(selected_light);'
                                      hs_hue: !lambda 'return std::to_string(id(sel_hue));'
                                      hs_sat: !lambda 'return std::to_string(id(sel_sat));'

              # Effacer la sélection
              - button:
                  height: 36
                  width: 100%
                  styles: control
                  on_click:
                    - script.execute: reset_light_context
                  widgets:
                    - label:
                        text: "✕ Effacer"
                        align: center
                        text_color: 0x888888


    # ═════════════════════════════════════════════
    # PAGE 2 — PC & PLUS
    # ═════════════════════════════════════════════
    - id: scenes_page
      layout:
        type: flex
        flex_flow: row_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: 0x0D1117
      bg_opa: cover
      pad_top: 48
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      on_load:
        - lvgl.widget.update:
            id: nav_lights_btn
            state: { checked: false }
        - lvgl.widget.update:
            id: nav_scenes_btn
            state: { checked: true }
        - script.execute: reset_light_context

      widgets:

        # ── Tout éteindre ───────────────────────
        - button:
            height: 200
            width: 340
            id: all_lights_off_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $lightbulb_off
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Tout éteindre"
            on_click:
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.ampoule_bureau
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x001788010dc8ba13
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x001788010c014263
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x001788010c58b8f2
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x00178801062d1c11
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x001788010dc8c061
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.la_boule
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x001788010c0adbc8
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x001788010c2dee03
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x001788010d0b3aa9
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.0x001788010c2de07e
              - homeassistant.service:
                  service: switch.turn_off
                  data:
                    entity_id: switch.lampe_couloir

        # ── Tout allumer ────────────────────────
        - button:
            height: 200
            width: 340
            id: all_lights_on_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $lightbulb_group
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Tout allumer"
            on_click:
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.ampoule_bureau
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x001788010dc8ba13
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x001788010c014263
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x001788010c58b8f2
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x00178801062d1c11
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x001788010dc8c061
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.la_boule
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x001788010c0adbc8
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x001788010c2dee03
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x001788010d0b3aa9
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.0x001788010c2de07e
              - homeassistant.service:
                  service: switch.turn_on
                  data:
                    entity_id: switch.lampe_couloir

        # ── Allumer le PC ───────────────────────
        - button:
            height: 200
            width: 340
            id: pc_wake_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $monitor
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Allumer PC"
            on_click:
              - homeassistant.service:
                  service: wake_on_lan.send_magic_packet
                  data:
                    mac: "XX:XX:XX:XX:XX:XX"

        # ── Éteindre le PC ──────────────────────
        - button:
            height: 200
            width: 340
            id: pc_shutdown_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $power
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Éteindre PC"
            on_click:
