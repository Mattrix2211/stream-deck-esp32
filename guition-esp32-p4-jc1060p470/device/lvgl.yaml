                  is_color_temp: false

        # ── Salle à manger ──────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: salle_manger_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $fork_knife
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Salle à manger"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010dc8c061
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(salle_manger_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.0x001788010dc8c061"
                  display_name: "Salle à manger"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: true
                  is_color_temp: false

        # ── La boule ────────────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: la_boule_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $filament
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "La boule"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.la_boule
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(la_boule_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.la_boule"
                  display_name: "La boule"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: true
                  is_color_temp: false

        # ── Salle de bain ───────────────────────
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: salle_bain_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_mid
                  text: $shower
              - label:
                  align: bottom_mid
                  text_align: center
                  text: "Salle de bain"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.0x001788010c0adbc8
            on_long_press:
              - lambda: 'id(selected_light_is_on) = id(salle_bain_light_state).state;'
              - script.execute:
                  id: select_light_context
                  entity_id: "light.0x001788010c0adbc8"
                  display_name: "Salle de bain"
                  is_dimmable: true
                  is_switch: false
                  is_rgb: true
                  is_color_temp: false

        # ── Cuisine ─────────────────────────────
